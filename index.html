<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quantum Circuit State Visualizer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #eef2f8;
      --ink: #172033;
      --muted: #687386;
      --line: #d5dce8;
      --wire: #b8c1d0;
      --brand: #4558b8;
      --brand-dark: #35479f;
      --single: #c9d9ee;
      --rot: #ead8e9;
      --multi: #cbdcf0;
      --gate-x: #efb8b3;
      --gate-rx: #f5cbc6;
      --gate-y: #a9d9cb;
      --gate-ry: #c5e7dc;
      --gate-z: #bdb5df;
      --gate-s: #c9bfe7;
      --gate-sdg: #d5caed;
      --gate-t: #c3b6dc;
      --gate-tdg: #dcd0e8;
      --gate-rz: #e4d8f0;
      --gate-h: #efd69f;
      --gate-u: #d8c8e8;
      --gate-cnot: #afd1eb;
      --gate-ccnot: #c4dcf0;
      --gate-cz: #c7b8e6;
      --gate-ccz: #d7caed;
      --gate-cp: #cabde8;
      --gate-postselect: #b9ddcf;
      --gate-cnot-wire: #5e7f9d;
      --gate-ccnot-wire: #6d8298;
      --gate-cz-wire: #75649c;
      --gate-ccz-wire: #806fa4;
      --gate-cp-wire: #79699f;
      --gate-ink: #273247;
      --block: #6f85a5;
      --block-fill: rgba(111, 133, 165, 0.07);
      --danger: #b42335;
      --ok: #13795b;
      --zero: #d7dde7;
      --shadow: 0 10px 28px rgba(35, 46, 75, 0.12);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 20px;
      background: var(--brand);
      color: #fff;
      box-shadow: 0 2px 8px rgba(22, 30, 58, 0.18);
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .brand span {
      color: rgba(255, 255, 255, 0.78);
      font-size: 12px;
      white-space: nowrap;
    }

    .header-actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .header-button,
    .tool-button,
    .small-button,
    .icon-button {
      border: 1px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    .header-button {
      padding: 7px 11px;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .header-button:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .dsl-dialog {
      width: min(820px, calc(100vw - 32px));
      max-height: calc(100vh - 32px);
      padding: 0;
      overflow: hidden;
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 54px rgba(22, 30, 58, 0.24);
    }

    .dsl-dialog::backdrop {
      background: rgba(23, 32, 51, 0.36);
    }

    .dsl-dialog-header,
    .dsl-dialog-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dsl-dialog-header {
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .dsl-dialog-header h2 {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0;
    }

    .dsl-dialog-close {
      width: 32px;
      height: 32px;
      padding: 0;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }

    .dsl-dialog-close:hover {
      background: var(--surface-2);
      border-color: var(--line);
      color: var(--ink);
    }

    .dsl-dialog-body {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .dsl-editor {
      width: 100%;
      min-height: min(54vh, 520px);
      padding: 12px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfe;
      color: var(--ink);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.55;
      tab-size: 2;
    }

    .dsl-editor:focus {
      border-color: var(--brand);
      outline: 2px solid rgba(69, 88, 184, 0.16);
      outline-offset: 1px;
    }

    .dsl-dialog-actions {
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .dsl-dialog-status {
      min-height: 18px;
      margin-right: auto;
      color: var(--ok);
      font-size: 12px;
      font-weight: 600;
    }

    .dsl-dialog-status.error {
      color: var(--danger);
    }

    .app {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(300px, 0.65fr);
      gap: 14px;
      padding: 14px;
    }

    .panel {
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      margin: 0;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .panel-tools {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tool-button,
    .small-button {
      background: #fff;
      border-color: var(--line);
      color: var(--ink);
      font-weight: 600;
    }

    .tool-button {
      padding: 8px 10px;
      font-size: 12px;
    }

    .small-button {
      padding: 6px 9px;
      font-size: 12px;
    }

    .step-count-input {
      width: 78px;
      min-height: 31px;
      padding: 5px 7px;
      border: 1px solid var(--line-dark);
      border-radius: 5px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      text-align: right;
    }

    .tool-button:hover,
    .small-button:hover,
    .icon-button:hover {
      border-color: #aab5c7;
      background: var(--surface-2);
    }

    .tool-button:active,
    .small-button:active,
    .icon-button:active {
      transform: translateY(1px);
    }

    .tool-button.danger,
    .small-button.danger {
      color: var(--danger);
    }

    .circuit-content {
      padding: 14px 16px 16px;
    }

    .palette {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 16px;
    }

    .gate-token {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      height: 40px;
      padding: 0 10px;
      border: 0;
      border-radius: 5px;
      color: var(--gate-ink);
      font-size: 13px;
      font-weight: 700;
      cursor: grab;
      user-select: none;
      touch-action: none;
      -webkit-user-drag: none;
      border: 1px solid rgba(54, 68, 91, 0.14);
      box-shadow: 0 1px 2px rgba(28, 38, 58, 0.1);
    }

    .gate-token:active {
      cursor: grabbing;
    }

    .drag-ghost {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 1000;
      pointer-events: none;
      opacity: 0.86;
      transform: translate(-50%, -50%);
    }

    .gate-token.single {
      background: var(--single);
    }

    .gate-token.rotation {
      background: var(--rot);
    }

    .gate-token.unitary {
      background: var(--gate-u);
    }

    .gate-token.postselection {
      background: var(--gate-postselect);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
    }

    .gate-token.multi {
      background: var(--multi);
    }

    .gate-token.block-create {
      border: 1px dashed var(--block);
      background: #eef2f7;
      color: #4b607e;
    }

    .gate-token[data-gate="X"],
    .placed-gate[data-gate="X"] {
      background: var(--gate-x);
    }

    .gate-token[data-gate="Y"],
    .placed-gate[data-gate="Y"] {
      background: var(--gate-y);
    }

    .gate-token[data-gate="Z"],
    .placed-gate[data-gate="Z"] {
      background: var(--gate-z);
    }

    .gate-token[data-gate="H"],
    .placed-gate[data-gate="H"] {
      background: var(--gate-h);
    }

    .gate-token[data-gate="T"],
    .placed-gate[data-gate="T"] {
      background: var(--gate-t);
    }

    .gate-token[data-gate="S"],
    .placed-gate[data-gate="S"] {
      background: var(--gate-s);
    }

    .gate-token[data-gate="SDG"],
    .placed-gate[data-gate="SDG"] {
      background: var(--gate-sdg);
    }

    .gate-token[data-gate="TDG"],
    .placed-gate[data-gate="TDG"] {
      background: var(--gate-tdg);
    }

    .gate-token[data-gate="RX"],
    .placed-gate[data-gate="RX"] {
      background: var(--gate-rx);
    }

    .gate-token[data-gate="RY"],
    .placed-gate[data-gate="RY"] {
      background: var(--gate-ry);
    }

    .gate-token[data-gate="RZ"],
    .placed-gate[data-gate="RZ"] {
      background: var(--gate-rz);
    }

    .gate-token[data-gate="U"],
    .placed-gate[data-gate="U"] {
      background: var(--gate-u);
    }

    .gate-token[data-gate="CNOT"] {
      background: var(--gate-cnot);
    }

    .gate-token[data-gate="CCNOT"] {
      background: var(--gate-ccnot);
    }

    .gate-token[data-gate="CZ"] {
      background: var(--gate-cz);
    }

    .gate-token[data-gate="CCZ"] {
      background: var(--gate-ccz);
    }

    .gate-token[data-gate="CP"] {
      background: var(--gate-cp);
    }

    .gate-token[data-gate="POSTSELECT"],
    .placed-gate[data-gate="POSTSELECT"] {
      background: var(--gate-postselect);
    }

    .block-library {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 7px;
      width: 100%;
      min-height: 32px;
      padding-top: 3px;
    }

    .block-library-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .block-token {
      min-height: 30px;
      padding: 5px 9px;
      border: 1px solid var(--block-color, #aab7c9);
      border-radius: 5px;
      background: var(--block-fill-color, #eef2f7);
      color: var(--block-ink-color, #405674);
      font-size: 12px;
      font-weight: 700;
      cursor: grab;
      touch-action: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .block-token.selected {
      box-shadow: 0 0 0 3px rgba(69, 88, 184, 0.24);
    }

    .block-definition-panel {
      margin-top: 14px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .block-definition-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .block-definition-heading {
      display: grid;
      gap: 3px;
      min-width: 160px;
    }

    .block-definition-heading span {
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .block-definition-heading strong {
      color: var(--ink);
      font-size: 14px;
    }

    .block-definition-tools {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 7px;
      flex-wrap: wrap;
    }

    .block-definition-tools .field-inline {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .block-definition-tools .field-inline label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .block-definition-tools input {
      width: 140px;
      min-height: 32px;
      padding: 5px 8px;
      border: 1px solid var(--line-dark);
      border-radius: 5px;
      color: var(--ink);
      background: #fff;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
    }

    .block-definition-tools button:disabled,
    .block-definition-tools input:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .block-definition-empty {
      display: flex;
      align-items: center;
      min-height: 72px;
      color: var(--muted);
      font-size: 12px;
    }

    .block-definition-empty[hidden],
    .block-editor-scroller[hidden] {
      display: none;
    }

    .block-editor-scroller {
      overflow: auto;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #f8faff;
      overscroll-behavior: contain;
    }

    .block-editor-palette {
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }

    .block-editor-palette .gate-token {
      height: 34px;
      min-width: 40px;
      padding: 0 8px;
      font-size: 12px;
    }

    .block-editor-library {
      margin-bottom: 10px;
      padding: 0 0 10px;
      border-bottom: 1px solid var(--line);
    }

    .block-definition-grid {
      min-width: 0;
      overflow: visible;
      box-shadow: none;
    }

    .block-definition-grid .corner-cell {
      color: var(--muted);
      font-size: 10px;
    }

    .block-definition-grid .corner-cell::after {
      content: "U";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    .block-definition-grid .block-handle {
      z-index: 8;
    }

    .workspace {
      position: relative;
      min-width: 0;
    }

    .circuit-scroller {
      max-height: min(68vh, 660px);
      overflow: auto;
      padding: 0 0 4px;
      overscroll-behavior: contain;
    }

    .circuit-grid {
      --cell-w: 64px;
      --cell-h: 56px;
      display: grid;
      grid-template-columns: 46px repeat(var(--steps), var(--cell-w));
      grid-template-rows: 34px repeat(var(--qubits), var(--cell-h));
      width: max-content;
      min-width: 100%;
      border: 0;
      border-radius: 0;
      overflow: hidden;
      background: transparent;
      position: relative;
    }

    .circuit-grid.block-definition-grid {
      width: max-content;
      min-width: max-content;
      overflow: visible;
    }

    .corner-cell,
    .step-header,
    .qubit-label,
    .drop-cell {
      position: relative;
      min-width: 0;
    }

    .corner-cell,
    .step-header {
      background: transparent;
      border-bottom: 0;
    }

    .step-header {
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .step-header.is-hovered {
      background: #eef2ff;
      color: var(--brand-dark);
    }

    .qubit-label {
      display: flex;
      align-items: center;
      justify-content: center;
      border-top: 0;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .drop-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 0;
      border-top: 0;
      background: linear-gradient(var(--wire), var(--wire)) center / 100% 2px no-repeat;
    }

    .drop-cell.is-hovered-step {
      background-color: #f4f6ff;
    }

    .drop-cell.drag-over {
      outline: 2px solid var(--brand);
      outline-offset: -3px;
      background-color: #eef2ff;
    }

    .drop-cell.invalid-drop {
      outline: 2px solid var(--danger);
      outline-offset: -3px;
    }

    .drop-cell.vertical-wire::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -1px;
      bottom: -1px;
      width: 2px;
      transform: translateX(-50%);
      background: var(--wire-color, #536179);
      z-index: 1;
    }

    .drop-cell.vertical-wire.wire-start::before {
      top: calc(50% + 1px);
    }

    .drop-cell.vertical-wire.wire-end::before {
      bottom: 50%;
    }

    .placed-gate,
    .control-dot,
    .target-symbol {
      position: relative;
      z-index: 2;
    }

    .placed-gate {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      height: 34px;
      padding: 0 8px;
      border: 0;
      border-radius: 5px;
      color: var(--gate-ink);
      font-size: 13px;
      font-weight: 800;
      cursor: grab;
      touch-action: none;
      -webkit-user-drag: none;
      border: 1px solid rgba(54, 68, 91, 0.14);
      box-shadow: 0 1px 2px rgba(28, 38, 58, 0.12);
    }

    .placed-gate.single {
      background: var(--single);
    }

    .placed-gate.rotation {
      background: var(--rot);
    }

    .placed-gate.unitary {
      background: var(--gate-u);
    }

    .placed-gate.postselection {
      width: 50px;
      min-width: 50px;
      padding: 0 2px;
      background: var(--gate-postselect);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 9px;
    }

    .placed-gate.multi {
      background: var(--multi);
    }

    .placed-gate[data-gate="X"] {
      background: var(--gate-x);
    }

    .placed-gate[data-gate="Y"] {
      background: var(--gate-y);
    }

    .placed-gate[data-gate="Z"] {
      background: var(--gate-z);
    }

    .placed-gate[data-gate="H"] {
      background: var(--gate-h);
    }

    .placed-gate[data-gate="T"] {
      background: var(--gate-t);
    }

    .placed-gate[data-gate="S"] {
      background: var(--gate-s);
    }

    .placed-gate[data-gate="SDG"] {
      background: var(--gate-sdg);
    }

    .placed-gate[data-gate="TDG"] {
      background: var(--gate-tdg);
    }

    .placed-gate[data-gate="RX"] {
      background: var(--gate-rx);
    }

    .placed-gate[data-gate="RY"] {
      background: var(--gate-ry);
    }

    .placed-gate[data-gate="RZ"] {
      background: var(--gate-rz);
    }

    .placed-gate.selected,
    .target-symbol.selected,
    .control-dot.selected {
      outline: 3px solid rgba(69, 88, 184, 0.35);
      outline-offset: 3px;
    }

    .block-overlay {
      position: absolute;
      z-index: 3;
      border: 2px solid var(--block-color, var(--block));
      border-radius: 5px;
      background: var(--block-fill-color, rgba(238, 242, 247, 0.96));
      pointer-events: none;
    }

    .block-overlay.previewable {
      pointer-events: auto;
    }

    .block-overlay.linked {
      border-style: dashed;
    }

    .block-overlay.adjoint {
      border-style: double;
      border-width: 3px;
    }

    .block-overlay.selected {
      box-shadow: 0 0 0 3px rgba(69, 88, 184, 0.2);
    }

    .block-overlay.invalid-resize {
      border-color: var(--danger);
      background: rgba(180, 35, 53, 0.06);
    }

    .block-caption {
      position: absolute;
      left: 50%;
      top: 50%;
      max-width: calc(100% - 8px);
      padding: 4px 6px;
      overflow: hidden;
      border: 1px solid var(--block-color, #9eacc0);
      border-radius: 4px;
      background: var(--block-fill-color, #f7f9fc);
      color: var(--block-ink-color, #405674);
      font-size: 11px;
      font-weight: 700;
      line-height: 16px;
      text-overflow: ellipsis;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      cursor: grab;
      pointer-events: auto;
      touch-action: none;
      user-select: none;
    }

    .block-handle {
      position: absolute;
      width: 12px;
      height: 12px;
      padding: 0;
      border: 2px solid #fff;
      border-radius: 3px;
      background: var(--block-color, var(--block));
      box-shadow: 0 0 0 1px var(--block-ink-color, #506783);
      pointer-events: auto;
      touch-action: none;
    }

    .block-handle[data-corner="nw"] {
      left: -7px;
      top: -7px;
      cursor: nwse-resize;
    }

    .block-handle[data-corner="ne"] {
      right: -7px;
      top: -7px;
      cursor: nesw-resize;
    }

    .block-handle[data-corner="sw"] {
      left: -7px;
      bottom: -7px;
      cursor: nesw-resize;
    }

    .block-handle[data-corner="se"] {
      right: -7px;
      bottom: -7px;
      cursor: nwse-resize;
    }

    .block-drag-ghost {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 1000;
      min-width: 72px;
      padding: 7px 10px;
      border: 2px solid var(--block-color, var(--block));
      border-radius: 5px;
      background: var(--block-fill-color, rgba(247, 249, 252, 0.96));
      color: var(--block-ink-color, #405674);
      font-size: 12px;
      font-weight: 700;
      pointer-events: none;
      transform: translate(-50%, -50%);
    }

    .block-hover-preview {
      position: fixed;
      z-index: 1200;
      max-width: calc(100vw - 24px);
      padding: 9px 10px 10px;
      border: 1px solid var(--block-color, var(--line));
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.98);
      color: var(--ink);
      box-shadow: 0 12px 32px rgba(35, 46, 75, 0.2);
      pointer-events: none;
    }

    .block-hover-preview[hidden] {
      display: none;
    }

    .block-hover-preview-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 7px;
    }

    .block-hover-preview-header strong {
      overflow: hidden;
      color: var(--block-ink-color, var(--ink));
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .block-hover-preview-header span {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 10px;
    }

    .block-hover-preview svg {
      display: block;
      width: auto;
      max-width: min(760px, calc(100vw - 44px));
      height: auto;
      max-height: min(430px, calc(100vh - 84px));
    }

    .control-dot {
      width: 13px;
      height: 13px;
      border-radius: 999px;
      background: var(--gate-color, #283042);
      box-shadow: 0 0 0 3px #fff;
      cursor: grab;
      touch-action: none;
      -webkit-user-drag: none;
    }

    .target-symbol {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border: 2px solid var(--gate-color, #283042);
      border-radius: 999px;
      background: #fff;
      color: var(--gate-color, #283042);
      font-size: 26px;
      font-weight: 500;
      line-height: 1;
      cursor: grab;
      touch-action: none;
      -webkit-user-drag: none;
    }

    .target-symbol::before,
    .target-symbol::after {
      content: "";
      position: absolute;
      background: currentColor;
      border-radius: 2px;
    }

    .target-symbol::before {
      width: 18px;
      height: 2px;
    }

    .target-symbol::after {
      width: 2px;
      height: 18px;
    }

    .target-symbol.phase-target {
      font-size: 13px;
      font-weight: 800;
    }

    .target-symbol.phase-target::before,
    .target-symbol.phase-target::after {
      display: none;
    }

    .drop-hint {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .trash-zone {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 86px;
      height: 40px;
      padding: 0 12px;
      border: 1px dashed #b87f88;
      border-radius: 5px;
      background: #fbf1f3;
      color: #8c3948;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }

    .trash-zone.drag-over {
      border-color: var(--danger);
      background: #f6dfe3;
      transform: scale(1.04);
    }

    .status {
      min-height: 18px;
      color: var(--ok);
      font-weight: 600;
    }

    .status.error {
      color: var(--danger);
    }

    .inspector {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 14px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcff;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .field input[type="range"] {
      width: 100%;
    }

    .field select,
    .field input[type="number"],
    .field input[type="text"] {
      width: 100%;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 5px 8px;
    }

    .field-actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .check-field {
      justify-content: flex-end;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
    }

    .angle-readout {
      font-variant-numeric: tabular-nums;
      color: var(--ink);
      font-weight: 700;
    }

    .vector-panel {
      display: flex;
      flex-direction: column;
      min-height: 620px;
    }

    .vector-content {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 14px 16px 16px;
      flex: 1;
      min-height: 0;
    }

    .step-readout {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }

    .step-readout strong {
      font-size: 16px;
    }

    .step-readout span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .state-vector {
      display: grid;
      gap: 9px;
      align-content: start;
      flex: 1 1 0;
      min-height: 260px;
      max-height: none;
      overflow-y: auto;
      padding-right: 5px;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
    }

    .state-vector.dense {
      gap: 3px;
    }

    .basis-row {
      display: grid;
      grid-template-columns: minmax(58px, auto) minmax(88px, 1fr) minmax(98px, auto);
      align-items: center;
      gap: 8px;
      min-height: 30px;
    }

    .state-vector.dense .basis-row {
      grid-template-columns: minmax(82px, auto) minmax(76px, 1fr) minmax(94px, auto);
      gap: 6px;
      min-height: 19px;
    }

    .basis-label {
      color: var(--ink);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .amplitude-track {
      position: relative;
      height: 18px;
      border-radius: 0;
      background: #edf1f7;
      overflow: hidden;
    }

    .state-vector.dense .amplitude-track {
      height: 10px;
    }

    .amplitude-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: calc(var(--mag) * 100%);
      min-width: var(--min-bar);
      border-radius: 0;
      background: var(--phase-color);
      transition: width 0.18s ease, background 0.18s ease;
    }

    .coefficient {
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .state-vector.dense .basis-label,
    .state-vector.dense .coefficient {
      font-size: 11px;
    }

    .phase-legend {
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 12px;
      align-items: center;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .phase-wheel {
      width: 58px;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at center, #fff 0 22%, transparent 23%),
        conic-gradient(from 0deg, hsl(120 78% 42%), hsl(180 78% 42%), hsl(240 78% 58%), hsl(300 78% 52%), hsl(0 78% 52%), hsl(60 78% 52%), hsl(120 78% 42%));
    }

    .legend-labels {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      color: var(--muted);
      font-size: 11px;
    }

    .legend-labels b {
      display: block;
      color: var(--ink);
      font-weight: 700;
    }

    .postselection-panel {
      display: grid;
      gap: 9px;
      padding: 10px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .postselection-panel.is-automatic {
      padding-right: 8px;
      padding-left: 8px;
      border-color: #91cbb6;
      background: #f0faf6;
      box-shadow: inset 3px 0 0 #3f9b78;
    }

    .postselection-panel[hidden] {
      display: none;
    }

    .postselection-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    .postselection-header strong {
      font-size: 13px;
    }

    .postselection-distribution {
      display: grid;
      gap: 3px;
      max-height: 280px;
      overflow-y: auto;
      padding-right: 5px;
      scrollbar-gutter: stable;
    }

    .postselection-distribution[hidden] {
      display: none;
    }

    .marginal-row {
      display: grid;
      grid-template-columns: minmax(62px, auto) minmax(70px, 1fr) 64px;
      align-items: center;
      gap: 7px;
      min-height: 18px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 10px;
      font-variant-numeric: tabular-nums;
    }

    .marginal-label {
      font-weight: 700;
      white-space: nowrap;
    }

    .marginal-track {
      height: 10px;
      overflow: hidden;
      background: #edf1f7;
    }

    .marginal-fill {
      height: 100%;
      width: calc(var(--probability) * 100%);
      min-width: var(--min-probability-bar);
      background: #57a84d;
    }

    .marginal-value {
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1040px) {
      .app {
        grid-template-columns: 1fr;
      }

      .vector-panel {
        min-height: 0;
      }

      .state-vector {
        flex: none;
        min-height: 260px;
        max-height: min(68vh, 720px);
      }

    }

    @media (max-width: 720px) {
      .app-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .header-actions {
        justify-content: flex-start;
      }

      .panel-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .inspector {
        grid-template-columns: 1fr 1fr;
      }

      .basis-row {
        grid-template-columns: 52px minmax(92px, 1fr);
      }

      .coefficient {
        grid-column: 2;
        text-align: left;
      }
    }

    @media (max-width: 480px) {
      .app {
        padding: 8px;
      }

      .circuit-content,
      .vector-content {
        padding: 12px;
      }

      .inspector,
      .phase-legend {
        grid-template-columns: 1fr;
      }

      .brand {
        align-items: flex-start;
        flex-direction: column;
        gap: 2px;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <h1>Quantum Circuit State Visualizer</h1>
      <span>drag gates, hover steps, read the state vector</span>
    </div>
    <div class="header-actions">
      <button class="header-button" id="dslButton" type="button">DSL</button>
      <button class="header-button" id="exampleButton" type="button">BELL EXAMPLE</button>
      <button class="header-button" id="groverExampleButton" type="button">GROVER EXAMPLE</button>
      <button class="header-button" id="randomExampleButton" type="button">RANDOM CIRCUIT</button>
      <button class="header-button" id="periodExampleButton" type="button">PERIOD FINDING</button>
      <button class="header-button" id="clearButton" type="button">RESET</button>
    </div>
  </header>

  <main class="app">
    <section class="panel circuit-panel" aria-labelledby="circuitTitle">
      <div class="panel-header">
        <h2 class="panel-title" id="circuitTitle">Quantum Circuit</h2>
        <div class="panel-tools">
          <button class="tool-button" id="addQubitButton" type="button">+ q</button>
          <button class="tool-button" id="removeQubitButton" type="button">- q</button>
          <button class="tool-button" id="addStepButton" type="button">+ step</button>
          <button class="tool-button" id="removeStepButton" type="button">- step</button>
          <input class="step-count-input" id="stepCountInput" type="number" min="1" max="1000" value="8" aria-label="step count">
          <button class="tool-button danger" id="deleteButton" type="button">DELETE</button>
        </div>
      </div>

      <div class="circuit-content">
        <div class="palette" aria-label="ゲートパレット">
          <button class="gate-token single" draggable="false" data-gate="X" type="button">X</button>
          <button class="gate-token single" draggable="false" data-gate="Y" type="button">Y</button>
          <button class="gate-token single" draggable="false" data-gate="Z" type="button">Z</button>
          <button class="gate-token single" draggable="false" data-gate="H" type="button">H</button>
          <button class="gate-token single" draggable="false" data-gate="S" type="button">S</button>
          <button class="gate-token single" draggable="false" data-gate="SDG" type="button">S†</button>
          <button class="gate-token single" draggable="false" data-gate="T" type="button">T</button>
          <button class="gate-token single" draggable="false" data-gate="TDG" type="button">T†</button>
          <button class="gate-token rotation" draggable="false" data-gate="RX" type="button">RX</button>
          <button class="gate-token rotation" draggable="false" data-gate="RY" type="button">RY</button>
          <button class="gate-token rotation" draggable="false" data-gate="RZ" type="button">RZ</button>
          <button class="gate-token unitary" draggable="false" data-gate="U" type="button">U</button>
          <button class="gate-token multi" draggable="false" data-gate="CNOT" type="button">CNOT</button>
          <button class="gate-token multi" draggable="false" data-gate="CCNOT" type="button">CCNOT</button>
          <button class="gate-token multi" draggable="false" data-gate="CZ" type="button">CZ</button>
          <button class="gate-token multi" draggable="false" data-gate="CCZ" type="button">CCZ</button>
          <button class="gate-token multi" draggable="false" data-gate="CP" type="button">CP</button>
          <button class="gate-token postselection" draggable="false" data-gate="POSTSELECT" type="button">|0&gt;&lt;0|</button>
          <button class="gate-token block-create" draggable="false" data-tool="BLOCK" type="button">Block</button>
          <button class="trash-zone" id="trashZone" type="button" aria-label="選択したゲートを削除、またはゲートをここへドラッグ">TRASH</button>
          <div class="block-library" id="blockLibrary" aria-label="定義済みブロック"></div>
        </div>

        <div class="workspace">
          <div class="circuit-scroller">
            <div id="circuitGrid" class="circuit-grid" aria-label="量子回路グリッド"></div>
          </div>
        </div>

        <div class="drop-hint">
          <span>ゲートとブロックはクリックで再編集できます。</span>
          <span class="status" id="statusLine" aria-live="polite"></span>
        </div>

        <div class="inspector" id="inspector" aria-label="選択ゲート設定"></div>

        <section class="block-definition-panel" aria-labelledby="blockDefinitionTitle">
          <div class="block-definition-header">
            <div class="block-definition-heading">
              <span>Block definition</span>
              <strong id="blockDefinitionTitle">No block selected</strong>
            </div>
            <div class="block-definition-tools">
              <button class="small-button" id="newBlockButton" type="button">New block</button>
              <div class="field-inline">
                <label for="blockNameInput">name</label>
                <input id="blockNameInput" type="text" aria-label="block name" placeholder="Block name" disabled>
              </div>
              <button class="small-button" id="removeBlockStepButton" type="button" disabled>- step</button>
              <button class="small-button" id="addBlockStepButton" type="button" disabled>+ step</button>
              <button class="small-button" id="removeBlockQubitButton" type="button" disabled>- q</button>
              <button class="small-button" id="addBlockQubitButton" type="button" disabled>+ q</button>
              <button class="small-button" id="placeBlockButton" type="button" disabled>Place U</button>
              <button class="small-button" id="placeAdjointBlockButton" type="button" disabled>Place U†</button>
              <button class="small-button danger" id="deleteBlockDefinitionButton" type="button" disabled>Delete definition</button>
            </div>
          </div>
          <div class="block-definition-empty" id="blockDefinitionEmpty">No block selected</div>
          <div class="block-editor-scroller" id="blockEditorScroller" hidden>
            <div class="palette block-editor-palette" aria-label="ブロック定義ゲートパレット">
              <button class="gate-token single" draggable="false" data-gate="X" type="button">X</button>
              <button class="gate-token single" draggable="false" data-gate="Y" type="button">Y</button>
              <button class="gate-token single" draggable="false" data-gate="Z" type="button">Z</button>
              <button class="gate-token single" draggable="false" data-gate="H" type="button">H</button>
              <button class="gate-token single" draggable="false" data-gate="S" type="button">S</button>
              <button class="gate-token single" draggable="false" data-gate="SDG" type="button">S†</button>
              <button class="gate-token single" draggable="false" data-gate="T" type="button">T</button>
              <button class="gate-token single" draggable="false" data-gate="TDG" type="button">T†</button>
              <button class="gate-token rotation" draggable="false" data-gate="RX" type="button">RX</button>
              <button class="gate-token rotation" draggable="false" data-gate="RY" type="button">RY</button>
              <button class="gate-token rotation" draggable="false" data-gate="RZ" type="button">RZ</button>
              <button class="gate-token unitary" draggable="false" data-gate="U" type="button">U</button>
              <button class="gate-token multi" draggable="false" data-gate="CNOT" type="button">CNOT</button>
              <button class="gate-token multi" draggable="false" data-gate="CCNOT" type="button">CCNOT</button>
              <button class="gate-token multi" draggable="false" data-gate="CZ" type="button">CZ</button>
              <button class="gate-token multi" draggable="false" data-gate="CCZ" type="button">CCZ</button>
              <button class="gate-token multi" draggable="false" data-gate="CP" type="button">CP</button>
              <button class="gate-token postselection" draggable="false" data-gate="POSTSELECT" type="button">|0&gt;&lt;0|</button>
            </div>
            <div class="block-library block-editor-library" id="blockEditorLibrary" aria-label="ブロック定義用ブロック一覧"></div>
            <div id="blockDefinitionGrid" class="circuit-grid block-definition-grid" aria-label="ブロック定義グリッド"></div>
          </div>
        </section>
      </div>
    </section>

    <aside class="panel vector-panel" aria-labelledby="vectorTitle">
      <div class="panel-header">
        <h2 class="panel-title" id="vectorTitle">State Vector</h2>
        <div class="panel-tools">
          <button class="small-button" id="initialStepButton" type="button">Initial</button>
          <button class="small-button" id="finalStepButton" type="button">Final</button>
        </div>
      </div>

      <div class="vector-content">
        <div class="step-readout">
          <strong id="stepLabel">Step 0</strong>
          <span id="stepDetail">初期状態</span>
        </div>

        <section class="postselection-panel" id="postselectionPanel" aria-labelledby="postselectionTitle" hidden>
          <div class="postselection-header">
            <strong id="postselectionTitle">Conditional marginal</strong>
          </div>
          <div
            class="postselection-distribution"
            id="postselectionDistribution"
            role="img"
            aria-label="postselection後の条件付き周辺確率分布"
            hidden
          ></div>
        </section>

        <div class="state-vector" id="stateVector" role="img" aria-label="状態ベクトルの振幅と位相"></div>

        <div class="phase-legend" aria-label="位相の色対応">
          <div class="phase-wheel" aria-hidden="true"></div>
          <div class="legend-labels">
            <span><b>0</b>+ real</span>
            <span><b>π/2</b>+ imag</span>
            <span><b>π</b>- real</span>
            <span><b>-π/2</b>- imag</span>
          </div>
        </div>
      </div>
    </aside>
  </main>

  <div class="block-hover-preview" id="blockHoverPreview" role="tooltip" hidden></div>

  <dialog class="dsl-dialog" id="dslDialog" aria-labelledby="dslDialogTitle">
    <div class="dsl-dialog-header">
      <h2 id="dslDialogTitle">QVIS DSL</h2>
      <button class="dsl-dialog-close" id="dslCloseButton" type="button" aria-label="Close DSL editor">×</button>
    </div>
    <div class="dsl-dialog-body">
      <textarea
        class="dsl-editor"
        id="dslText"
        aria-label="QVIS DSL source"
        autocapitalize="off"
        autocomplete="off"
        spellcheck="false"
      ></textarea>
      <div class="dsl-dialog-actions">
        <span class="dsl-dialog-status" id="dslStatus" aria-live="polite"></span>
        <button class="small-button" id="dslExportButton" type="button">Export</button>
        <button class="small-button" id="dslImportButton" type="button">Import</button>
        <button class="small-button" id="dslOpenButton" type="button">Open</button>
        <button class="small-button" id="dslDownloadButton" type="button">Download</button>
        <input id="dslFileInput" type="file" accept=".qvis,.txt,text/plain" hidden>
      </div>
    </div>
  </dialog>

  <script>
    const gateGroups = {
      X: "single",
      Y: "single",
      Z: "single",
      H: "single",
      S: "single",
      SDG: "single",
      T: "single",
      TDG: "single",
      RX: "rotation",
      RY: "rotation",
      RZ: "rotation",
      U: "unitary",
      CNOT: "multi",
      CCNOT: "multi",
      CZ: "multi",
      CCZ: "multi",
      CP: "controlled-phase",
      POSTSELECT: "postselection"
    };

    function gateLabel(type, value = 0) {

    function gateCssVar(type) {
      return `--gate-${type.toLowerCase()}`;
    }

    function gateCssValue(type) {
      return `var(${gateCssVar(type)})`;
    }

    function gateWireCssValue(type) {
      if (isControlledGate(type)) return `var(--gate-${type.toLowerCase()}-wire)`;
      return gateCssValue(type);
    }

    function isControlledGate(type) {
      return type === "CNOT" || type === "CCNOT" || type === "CZ" || type === "CCZ" || type === "CP";
    }

    function isControlledZGate(type) {
      return type === "CZ" || type === "CCZ";
    }

    function isControlledPhaseGate(type) {
      return type === "CP";

    function minimumControlCount(type) {
      return type === "CCNOT" || type === "CCZ" ? 2 : 1;

    function applyGateColor(node, type) {

    class DslError extends Error {
      constructor(line, message) {
        super(`Line ${line}: ${message}`);
        this.name = "DslError";
        this.line = line;
      }
    }

    function tokenizeDsl(source) {
      const tokens = [];
      let index = 0;
      let line = 1;
      let column = 1;

      function advance() {
        const char = source[index];
        index += 1;
        if (char === "\n") {
          line += 1;
          column = 1;
        } else {
          column += 1;
        }
        return char;
      }

      function push(kind, value, tokenLine = line, tokenColumn = column) {
        tokens.push({ kind, value, line: tokenLine, column: tokenColumn });
      }

      while (index < source.length) {
        const char = source[index];
        if (/\s/.test(char)) {
          advance();
          continue;
        }
        if (char === "/" && source[index + 1] === "/") {
          while (index < source.length && source[index] !== "\n") advance();
          continue;
        }
        if (char === "/" && source[index + 1] === "*") {
          const startLine = line;
          advance();
          advance();
          while (index < source.length && !(source[index] === "*" && source[index + 1] === "/")) {
            advance();
          }
          if (index >= source.length) throw new DslError(startLine, "Unterminated block comment.");
          advance();
          advance();
          continue;
        }

        const tokenLine = line;
        const tokenColumn = column;
        if (char === "\"") {
          advance();
          let value = "";
          let closed = false;
          while (index < source.length) {
            const next = advance();
            if (next === "\"") {
              closed = true;
              break;
            }
            if (next === "\\") {
              if (index >= source.length) break;
              const escaped = advance();
              const escapes = {
                b: "\b",
                f: "\f",
                n: "\n",
                r: "\r",
                t: "\t",
                "\"": "\"",
                "\\": "\\"
              };
              if (escaped === "u") {
                const hex = source.slice(index, index + 4);
                if (!/^[0-9A-Fa-f]{4}$/.test(hex)) {
                  throw new DslError(tokenLine, "Invalid Unicode escape sequence.");
                }
                for (let i = 0; i < 4; i += 1) advance();
                value += String.fromCharCode(Number.parseInt(hex, 16));
              } else if (escaped in escapes) {
                value += escapes[escaped];
              } else {
                throw new DslError(tokenLine, `Unsupported escape sequence \\${escaped}.`);
              }
            } else {
              value += next;
            }
          }
          if (!closed) throw new DslError(tokenLine, "Unterminated string.");
          push("string", value, tokenLine, tokenColumn);
          continue;
        }

        if (/[A-Za-z_]/.test(char)) {
          let value = "";
          while (index < source.length && /[A-Za-z0-9_]/.test(source[index])) value += advance();
          push("identifier", value, tokenLine, tokenColumn);
          continue;
        }

        if (/\d/.test(char) || (char === "." && /\d/.test(source[index + 1] || ""))) {
          const rest = source.slice(index);
          const match = rest.match(/^(?:\d+\.\d*|\.\d+|\d+)(?:[eE][+-]?\d+)?/);
          if (!match) throw new DslError(tokenLine, "Invalid number.");
          for (let i = 0; i < match[0].length; i += 1) advance();
          push("number", Number(match[0]), tokenLine, tokenColumn);
          continue;
        }

        if ("{}()[],;@+-*/".includes(char)) {
          push("symbol", advance(), tokenLine, tokenColumn);
          continue;
        }
        throw new DslError(tokenLine, `Unexpected character "${char}".`);
      }
      tokens.push({ kind: "eof", value: "", line, column });
      return tokens;
    }

    function parseDsl(source) {
      const tokens = tokenizeDsl(source);
      let position = 0;

      function peek(offset = 0) {
        return tokens[Math.min(position + offset, tokens.length - 1)];
      }

      function take() {
        const token = peek();
        position += 1;
        return token;
      }

      function isKeyword(token, keyword) {
        return token.kind === "identifier" && token.value.toLowerCase() === keyword.toLowerCase();
      }

      function matchKeyword(keyword) {
        if (!isKeyword(peek(), keyword)) return false;
        take();
        return true;
      }

      function expectKeyword(keyword) {
        const token = take();
        if (!isKeyword(token, keyword)) {
          throw new DslError(token.line, `Expected "${keyword}".`);
        }
        return token;
      }

      function matchSymbol(symbol) {
        const token = peek();
        if (token.kind !== "symbol" || token.value !== symbol) return false;
        take();
        return true;
      }

      function expectSymbol(symbol) {
        const token = take();
        if (token.kind !== "symbol" || token.value !== symbol) {
          throw new DslError(token.line, `Expected "${symbol}".`);
        }
        return token;
      }

      function expectNumber(label) {
        const token = take();
        if (token.kind !== "number" || !Number.isFinite(token.value)) {
          throw new DslError(token.line, `Expected ${label}.`);
        }
        return token;
      }

      function expectInteger(label) {
        const token = expectNumber(label);
        if (!Number.isInteger(token.value)) {
          throw new DslError(token.line, `${label} must be an integer.`);
        }
        return token;
      }

      function expectIdentifier(label) {
        const token = take();
        if (token.kind !== "identifier") {
          throw new DslError(token.line, `Expected ${label}.`);
        }
        return token;
      }

      function expectName() {
        const token = take();
        if (token.kind !== "string" && token.kind !== "identifier") {
          throw new DslError(token.line, "Expected a block display name.");
        }
        return token;
      }

      function parseQubit() {
        const token = expectIdentifier("a qubit such as q0");
        const compact = token.value.match(/^q(\d+)$/i);
        if (compact) return { value: Number(compact[1]), line: token.line };
        if (token.value.toLowerCase() !== "q") {
          throw new DslError(token.line, `Invalid qubit "${token.value}".`);
        }
        expectSymbol("[");
        const number = expectInteger("a qubit index");
        expectSymbol("]");
        return { value: number.value, line: token.line };
      }

      function parseQubitList() {
        const qubits = [];
        expectSymbol("(");
        if (!matchSymbol(")")) {
          do {
            qubits.push(parseQubit().value);
          } while (matchSymbol(","));
          expectSymbol(")");
        }
        return qubits;
      }

      function parseAnglePrimary() {
        const token = peek();
        if (token.kind === "number") {
          take();
          return token.value;
        }
        if (isKeyword(token, "pi")) {
          take();
          return Math.PI;
        }
        if (matchSymbol("(")) {
          const value = parseAngleAdditive();
          expectSymbol(")");
          return value;
        }
        throw new DslError(token.line, "Expected an angle expression.");
      }

      function parseAngleUnary() {
        if (matchSymbol("+")) return parseAngleUnary();
        if (matchSymbol("-")) return -parseAngleUnary();
        return parseAnglePrimary();
      }

      function parseAngleMultiplicative() {
        let value = parseAngleUnary();
        while (true) {
          if (matchSymbol("*")) {
            value *= parseAngleUnary();
          } else if (matchSymbol("/")) {
            const divisorToken = peek();
            const divisor = parseAngleUnary();
            if (divisor === 0) throw new DslError(divisorToken.line, "Angle division by zero.");
            value /= divisor;
          } else {
            return value;
          }
        }
      }

      function parseAngleAdditive() {
        let value = parseAngleMultiplicative();
        while (true) {
          if (matchSymbol("+")) value += parseAngleMultiplicative();
          else if (matchSymbol("-")) value -= parseAngleMultiplicative();
          else return value;
        }
      }

      function parseOperation() {
        const line = peek().line;
        let adjoint = false;
        if (matchKeyword("inv")) {
          expectSymbol("@");
          adjoint = true;
        }

        if (matchKeyword("use")) {
          const alias = expectIdentifier("a block identifier");
          const qubit = parseQubit();
          expectSymbol("@");
          const step = expectInteger("a step number");
          expectSymbol(";");
          return {
            kind: "block",
            alias: alias.value,
            qubit: qubit.value,
            step: step.value,
            adjoint,
            line
          };
        }

        const gateToken = expectIdentifier("a gate name");
        const requestedType = gateToken.value.toUpperCase();
        const aliases = {
          CX: "CNOT",
          CCX: "CCNOT",
          POST: "POSTSELECT",
          P0: "POSTSELECT",
          P1: "POSTSELECT"
        };
        let type = aliases[requestedType] || requestedType;
        if (!gateGroups[type]) throw new DslError(gateToken.line, `Unknown gate "${gateToken.value}".`);
        let theta = Math.PI / 2;
        let phi = 0;
        let lambda = 0;
        let value = requestedType === "P1" ? 1 : 0;
        if (matchSymbol("(")) {
          if (gateGroups[type] === "rotation" || isControlledPhaseGate(type)) {
            theta = parseAngleAdditive();
            expectSymbol(")");
          } else if (gateGroups[type] === "unitary") {
            theta = parseAngleAdditive();
            expectSymbol(",");
            phi = parseAngleAdditive();
            expectSymbol(",");
            lambda = parseAngleAdditive();
            expectSymbol(")");
          } else if (gateGroups[type] === "postselection") {
            value = expectInteger("a postselection value").value;
            expectSymbol(")");
            if (value !== 0 && value !== 1) {
              throw new DslError(gateToken.line, "Postselection value must be 0 or 1.");
            }
          } else {
            throw new DslError(gateToken.line, `${type} does not take an angle.`);
          }
          if (![theta, phi, lambda].every(Number.isFinite)) {
            throw new DslError(gateToken.line, "Angles must be finite.");
          }
        } else if (
          gateGroups[type] === "rotation"
          || gateGroups[type] === "unitary"
          || isControlledPhaseGate(type)
          || gateGroups[type] === "postselection" && requestedType !== "P0" && requestedType !== "P1"
        ) {
          throw new DslError(
            gateToken.line,
            `${type} requires ${type === "U" ? "three angles" : gateGroups[type] === "postselection" ? "value 0 or 1" : "an angle"}.`
          );
        }

        const target = parseQubit();
        const controls = [];
        if (matchKeyword("controls")) {
          expectSymbol("(");
          if (!matchSymbol(")")) {
            do {
              controls.push(parseQubit().value);
            } while (matchSymbol(","));
            expectSymbol(")");
          }
        }
        expectSymbol("@");
        const step = expectInteger("a step number");
        expectSymbol(";");

        if (adjoint) {
          const inverseTypes = { S: "SDG", SDG: "S", T: "TDG", TDG: "T" };
          type = inverseTypes[type] || type;
          if (gateGroups[type] === "rotation" || isControlledPhaseGate(type)) theta = -theta;
          if (gateGroups[type] === "unitary") {
            const originalPhi = phi;
            theta = -theta;
            phi = -lambda;
            lambda = -originalPhi;
          }
        }
        return {
          kind: "gate",
          type,
          target: target.value,
          controls,
          theta,
          phi,
          lambda,
          value,
          step: step.value,
          line
        };
      }

      function parseBody() {
        const operations = [];
        expectSymbol("{");
        while (!matchSymbol("}")) {
          if (peek().kind === "eof") throw new DslError(peek().line, "Expected \"}\".");
          operations.push(parseOperation());
        }
        return operations;
      }

      expectKeyword("QVIS");
      const version = expectNumber("the DSL version");
      if (version.value !== 1) throw new DslError(version.line, `Unsupported QVIS version ${version.value}.`);
      expectSymbol(";");

      const circuitLine = expectKeyword("circuit").line;
      expectKeyword("qubits");
      const qubits = expectInteger("the qubit count");
      expectKeyword("steps");
      const steps = expectInteger("the step count");
      expectSymbol(";");

      const blocks = [];
      while (isKeyword(peek(), "block")) {
        const blockLine = take().line;
        const alias = expectIdentifier("a block identifier");
        expectKeyword("name");
        const name = expectName();
        expectKeyword("qubits");
        const height = expectInteger("the block qubit count");
        expectKeyword("steps");
        const width = expectInteger("the block step count");
        let hue = null;
        if (matchKeyword("color")) hue = expectNumber("a color hue").value;
        const operations = parseBody();
        blocks.push({
          alias: alias.value,
          name: name.value,
          height: height.value,
          width: width.value,
          hue,
          operations,
          line: blockLine
        });
      }

      const mainLine = expectKeyword("main").line;
      const operations = parseBody();
      let view = { step: steps.value, blockAlias: null, postselection: null, line: mainLine };
      if (matchKeyword("view")) {
        const viewLine = tokens[position - 1].line;
        expectKeyword("step");
        const viewStep = expectInteger("the view step");
        let blockAlias = null;
        if (matchKeyword("block")) blockAlias = expectIdentifier("a block identifier").value;
        let postselection = null;
        if (matchKeyword("postselect")) {
          const projectQubits = parseQubitList();
          expectKeyword("state");
          const outcomeToken = take();
          if (outcomeToken.kind !== "string" && outcomeToken.kind !== "identifier" && outcomeToken.kind !== "number") {
            throw new DslError(outcomeToken.line, "Expected a postselection basis state.");
          }
          const outcome = String(outcomeToken.value);
          let marginalQubits = null;
          if (matchKeyword("marginal")) marginalQubits = parseQubitList();
          postselection = { projectQubits, outcome, marginalQubits, line: viewLine };
        }
        expectSymbol(";");
        view = { step: viewStep.value, blockAlias, postselection, line: viewLine };
      }
      if (peek().kind !== "eof") throw new DslError(peek().line, "Unexpected content after the view statement.");

      return {
        qubits: qubits.value,
        steps: steps.value,
        blocks,
        operations,
        view,
        line: circuitLine
      };
    }

    function validateDsl(ast) {
      if (ast.qubits < 1 || ast.qubits > 10) {
        throw new DslError(ast.line, "Circuit qubits must be between 1 and 10.");
      }
      if (ast.steps < 1 || ast.steps > MAX_STEPS) {
        throw new DslError(ast.line, `Circuit steps must be between 1 and ${MAX_STEPS}.`);
      }

      const blocksByAlias = new Map();
      for (const block of ast.blocks) {
        if (blocksByAlias.has(block.alias)) {
          throw new DslError(block.line, `Duplicate block identifier "${block.alias}".`);
        }
        if (!block.name.trim()) throw new DslError(block.line, "Block display name cannot be empty.");
        if (block.width < 1 || block.width > MAX_BLOCK_STEPS) {
          throw new DslError(block.line, `Block steps must be between 1 and ${MAX_BLOCK_STEPS}.`);
        }
        if (block.height < 1 || block.height > ast.qubits) {
          throw new DslError(block.line, `Block qubits must be between 1 and ${ast.qubits}.`);
        }
        if (block.hue !== null && (!Number.isFinite(block.hue) || block.hue < 0 || block.hue >= 360)) {
          throw new DslError(block.line, "Block color hue must be in the range 0 to 359.");
        }
        blocksByAlias.set(block.alias, block);
      }

      const visiting = new Set();
      const visited = new Set();
      function visitBlock(block) {
        if (visiting.has(block.alias)) {
          throw new DslError(block.line, `Block cycle detected at "${block.alias}".`);
        }
        if (visited.has(block.alias)) return;
        visiting.add(block.alias);
        for (const operation of block.operations) {
          if (operation.kind !== "block") continue;
          const nested = blocksByAlias.get(operation.alias);
          if (!nested) {
            throw new DslError(operation.line, `Unknown block "${operation.alias}".`);
          }
          visitBlock(nested);
        }
        visiting.delete(block.alias);
        visited.add(block.alias);
      }
      for (const block of ast.blocks) visitBlock(block);

      function validateOperations(operations, stepCount, qubitCount, scopeName) {
        const occupiedByStep = new Map();
        for (const operation of operations) {
          if (operation.step < 1 || operation.step > stepCount) {
            throw new DslError(operation.line, `${scopeName} step must be between 1 and ${stepCount}.`);
          }
          let rows;
          if (operation.kind === "block") {
            const definition = blocksByAlias.get(operation.alias);
            if (!definition) {
              throw new DslError(operation.line, `Unknown block "${operation.alias}".`);
            }
            const bottom = operation.qubit + definition.height - 1;
            if (operation.qubit < 0 || bottom >= qubitCount) {
              throw new DslError(operation.line, `${operation.alias} does not fit in ${scopeName}.`);
            }
            rows = Array.from({ length: definition.height }, (_, index) => operation.qubit + index);
          } else {
            const controlled = isControlledGate(operation.type);
            if (operation.target < 0 || operation.target >= qubitCount) {
              throw new DslError(operation.line, `Target q${operation.target} is outside ${scopeName}.`);
            }
            const uniqueControls = new Set(operation.controls);
            if (uniqueControls.size !== operation.controls.length) {
              throw new DslError(operation.line, "Control qubits must be unique.");
            }
            if (operation.controls.includes(operation.target)) {
              throw new DslError(operation.line, "A target qubit cannot also be a control.");
            }
            if (operation.controls.some(control => control < 0 || control >= qubitCount)) {
              throw new DslError(operation.line, `A control qubit is outside ${scopeName}.`);
            }
            const requiredControls = minimumControlCount(operation.type);
            if (controlled && operation.controls.length < requiredControls) {
              throw new DslError(
                operation.line,
                `${operation.type} requires at least ${requiredControls} control qubit(s).`
              );
            }
            if (!controlled && operation.controls.length) {
              throw new DslError(operation.line, `${operation.type} cannot have controls.`);
            }
            if (controlled) {
              const used = [operation.target, ...operation.controls];
              const min = Math.min(...used);
              const max = Math.max(...used);
              rows = Array.from({ length: max - min + 1 }, (_, index) => min + index);
            } else {
              rows = [operation.target];
            }
          }

          const occupied = occupiedByStep.get(operation.step) || new Set();
          if (rows.some(row => occupied.has(row))) {
            throw new DslError(operation.line, `An operation overlaps another operation in ${scopeName}.`);
          }
          for (const row of rows) occupied.add(row);
          occupiedByStep.set(operation.step, occupied);
        }
      }

      for (const block of ast.blocks) {
        validateOperations(block.operations, block.width, block.height, `block "${block.alias}"`);
      }
      validateOperations(ast.operations, ast.steps, ast.qubits, "main");
      if (ast.view.step < 0 || ast.view.step > ast.steps) {
        throw new DslError(ast.view.line, `View step must be between 0 and ${ast.steps}.`);
      }
      if (ast.view.blockAlias && !blocksByAlias.has(ast.view.blockAlias)) {
        throw new DslError(ast.view.line, `Unknown view block "${ast.view.blockAlias}".`);
      }
      if (ast.view.postselection) {
        const selection = ast.view.postselection;
        if (!selection.projectQubits.length) {
          throw new DslError(selection.line, "Postselection requires at least one qubit.");
        }
        if (new Set(selection.projectQubits).size !== selection.projectQubits.length) {
          throw new DslError(selection.line, "Postselection qubits must be unique.");
        }
        if (selection.projectQubits.some(qubit => qubit < 0 || qubit >= ast.qubits)) {
          throw new DslError(selection.line, "A postselection qubit is outside the circuit.");
        }
        if (!/^[01]+$/.test(selection.outcome) || selection.outcome.length !== selection.projectQubits.length) {
          throw new DslError(
            selection.line,
            "Postselection state must contain one binary digit per selected qubit."
          );
        }
        if (selection.marginalQubits !== null) {
          if (new Set(selection.marginalQubits).size !== selection.marginalQubits.length) {
            throw new DslError(selection.line, "Marginal qubits must be unique.");
          }
          if (selection.marginalQubits.some(qubit => qubit < 0 || qubit >= ast.qubits)) {
            throw new DslError(selection.line, "A marginal qubit is outside the circuit.");
          }
          if (selection.marginalQubits.some(qubit => selection.projectQubits.includes(qubit))) {
            throw new DslError(selection.line, "Postselection and marginal registers must be disjoint.");
          }
        }
      }
      return blocksByAlias;
    }

    function buildStateFromDsl(source) {
      const ast = parseDsl(source);
      validateDsl(ast);
      let nextId = 1;
      const next = prefix => `${prefix}${nextId++}`;
      const definitions = ast.blocks.map((block, index) => ({
        id: next("d"),
        alias: block.alias,
        name: block.name,
        width: block.width,
        height: block.height,
        color: blockColorFromHue(block.hue ?? ((index * 137 + Math.floor(Math.random() * 80)) % 360)),
        gates: [],
        blocks: []
      }));
      const definitionByAlias = new Map(definitions.map(definition => [definition.alias, definition]));

      function buildOperations(operations, owner = null) {
        const gates = [];
        const blocks = [];
        for (const operation of operations) {
          if (operation.kind === "gate") {
            gates.push({
              id: next("g"),
              type: operation.type,
              step: operation.step - 1,
              target: operation.target,
              controls: [...operation.controls],
              theta: operation.theta,
              phi: operation.phi,
              lambda: operation.lambda,
              value: operation.value
            });
          } else {
            const definition = definitionByAlias.get(operation.alias);
            blocks.push({
              id: next(owner ? "n" : "b"),
              definitionId: definition.id,
              step: operation.step - 1,
              qubit: operation.qubit,
              adjoint: operation.adjoint
            });
          }
        }
        return { gates, blocks };
      }

      for (let index = 0; index < ast.blocks.length; index += 1) {
        const built = buildOperations(ast.blocks[index].operations, definitions[index]);
        definitions[index].gates = built.gates;
        definitions[index].blocks = built.blocks;
        delete definitions[index].alias;
      }
      const root = buildOperations(ast.operations);
      const activeDefinition = ast.view.blockAlias
        ? definitionByAlias.get(ast.view.blockAlias)
        : definitions[0] || null;
      return {
        qubits: ast.qubits,
        steps: ast.steps,
        ops: root.gates,
        blockDefinitions: definitions,
        blockInstances: root.blocks,
        activeDefinitionId: activeDefinition?.id || null,
        hoverStep: ast.view.step,
        postselection: ast.view.postselection
          ? {
              projectQubits: [...ast.view.postselection.projectQubits],
              outcome: ast.view.postselection.outcome,
              marginalQubits: ast.view.postselection.marginalQubits === null
                ? Array.from({ length: ast.qubits }, (_, qubit) => qubit)
                    .filter(qubit => !ast.view.postselection.projectQubits.includes(qubit))
                : [...ast.view.postselection.marginalQubits]
            }
          : null,
        nextId
      };
    }

    function formatDslAngle(theta) {
      if (Math.abs(theta) < 1e-12) return "0";
      const ratio = theta / Math.PI;
      for (let denominator = 1; denominator <= 64; denominator += 1) {
        const numerator = Math.round(ratio * denominator);
        if (Math.abs(ratio - numerator / denominator) > 1e-10) continue;
        if (denominator === 1) {
          if (numerator === 1) return "pi";
          if (numerator === -1) return "-pi";
          return `${numerator}*pi`;
        }
        if (numerator === 1) return `pi/${denominator}`;
        if (numerator === -1) return `-pi/${denominator}`;
        return `${numerator}*pi/${denominator}`;
      }
      return Number(theta.toPrecision(12)).toString();
    }

    function dslBlockAliases() {
      const aliases = new Map();
      const used = new Set();
      const reserved = new Set([
        "qvis", "circuit", "qubits", "steps", "block", "name", "color", "main", "view",
        "use", "inv", "controls", "pi", "post", "p0", "p1", "postselect", "state", "marginal",
        ...gateTypes.map(type => type.toLowerCase())
      ]);
      for (let index = 0; index < appState.blockDefinitions.length; index += 1) {
        const definition = appState.blockDefinitions[index];
        let base = definition.name
          .normalize("NFKD")
          .replace(/[^A-Za-z0-9_]+/g, "_")
          .replace(/^_+|_+$/g, "");
        if (!base) base = `block_${index + 1}`;
        if (/^\d/.test(base)) base = `b_${base}`;
        if (reserved.has(base.toLowerCase())) base = `b_${base}`;
        let alias = base;
        let suffix = 2;
        while (used.has(alias)) {
          alias = `${base}_${suffix}`;
          suffix += 1;
        }
        used.add(alias);
        aliases.set(definition.id, alias);
      }
      return aliases;
    }

    function serializeDslOperation(operation, aliases, indent = "  ") {
      const step = operation.step + 1;
      if (operation.definitionId) {
        const alias = aliases.get(operation.definitionId);
        return `${indent}${operation.adjoint ? "inv @ " : ""}use ${alias} q${operation.qubit} @${step};`;
      }
      let angle = "";
      if (gateGroups[operation.type] === "rotation") {
        angle = `(${formatDslAngle(operation.theta ?? Math.PI / 2)})`;
      } else if (isControlledPhaseGate(operation.type)) {
        angle = `(${formatDslAngle(operation.theta ?? Math.PI / 2)})`;
      } else if (gateGroups[operation.type] === "unitary") {
        angle = `(${[
          formatDslAngle(operation.theta ?? Math.PI / 2),
          formatDslAngle(operation.phi ?? 0),
          formatDslAngle(operation.lambda ?? 0)
        ].join(", ")})`;
      } else if (gateGroups[operation.type] === "postselection") {
        angle = `(${operation.value === 1 ? 1 : 0})`;
      }
      const controls = operation.controls?.length
        ? ` controls(${operation.controls.map(control => `q${control}`).join(", ")})`
        : "";
      const type = operation.type === "POSTSELECT" ? "POST" : operation.type;
      return `${indent}${type}${angle} q${operation.target}${controls} @${step};`;
    }

    function exportDsl() {
      const aliases = dslBlockAliases();
      const lines = [
        "QVIS 1.0;",
        `circuit qubits ${appState.qubits} steps ${appState.steps};`,
        ""
      ];

      for (const definition of appState.blockDefinitions) {
        const color = ensureBlockColor(definition);
        lines.push(
          `block ${aliases.get(definition.id)} name ${JSON.stringify(definition.name)} `
          + `qubits ${definition.height} steps ${definition.width} color ${color.hue} {`
        );
        const entries = [
          ...definition.gates.map(gate => ({ ...gate, kind: "gate", row: gate.target })),
          ...(definition.blocks || []).map(block => ({ ...block, kind: "block", row: block.qubit }))
        ].sort((a, b) => (
          a.step - b.step
          || a.row - b.row
          || a.kind.localeCompare(b.kind)
        ));
        for (const entry of entries) lines.push(serializeDslOperation(entry, aliases));
        lines.push("}", "");
      }

      lines.push("main {");
      const rootEntries = [
        ...appState.ops.map(gate => ({ ...gate, kind: "gate", row: gate.target })),
        ...appState.blockInstances.map(block => ({ ...block, kind: "block", row: block.qubit }))
      ].sort((a, b) => (
        a.step - b.step
        || a.row - b.row
        || a.kind.localeCompare(b.kind)
      ));
      for (const entry of rootEntries) lines.push(serializeDslOperation(entry, aliases));
      lines.push("}", "");
      const activeAlias = aliases.get(appState.activeDefinitionId);
      const selection = appState.postselection;
      const selectionDsl = selection
        ? ` postselect(${selection.projectQubits.map(qubit => `q${qubit}`).join(", ")})`
          + ` state ${JSON.stringify(selection.outcome)}`
          + ` marginal(${selection.marginalQubits.map(qubit => `q${qubit}`).join(", ")})`
        : "";
      lines.push(`view step ${appState.hoverStep}${activeAlias ? ` block ${activeAlias}` : ""}${selectionDsl};`);
      return lines.join("\n");
    }

    function applyDslState(nextState) {
      cancelPointerDrag();
      appState.qubits = nextState.qubits;
      appState.steps = nextState.steps;
      appState.ops = nextState.ops;
      appState.blockDefinitions = nextState.blockDefinitions;
      appState.blockInstances = nextState.blockInstances;
      appState.activeDefinitionId = nextState.activeDefinitionId;
      appState.hoverStep = nextState.hoverStep;
      appState.postselection = nextState.postselection;
      appState.nextId = nextState.nextId;
      const highestDefaultNumber = appState.blockDefinitions.reduce((highest, definition) => {
        const match = definition.name.match(/^U(\d+)$/);
        return match ? Math.max(highest, Number(match[1])) : highest;
      }, 0);
      appState.nextBlockNumber = Math.max(appState.blockDefinitions.length + 1, highestDefaultNumber + 1);
      appState.placementMode = null;
      appState.dragPayload = null;
      appState.pointerDrag = null;
      clearSelection();
      appState.simulationCache = { qubits: null, stepSignatures: [], states: [] };
      render();
    }

    function setDslStatus(message, isError = false) {
      el.dslStatus.textContent = message;
      el.dslStatus.classList.toggle("error", isError);
    }

    function selectDslErrorLine(line) {
      if (!Number.isInteger(line) || line < 1) return;
      const lines = el.dslText.value.split("\n");
      const start = lines.slice(0, line - 1).reduce((total, value) => total + value.length + 1, 0);
      const end = start + (lines[line - 1]?.length || 0);
      el.dslText.focus();
      el.dslText.setSelectionRange(start, end);
    }

    function importDslFromEditor() {
      try {
        const nextState = buildStateFromDsl(el.dslText.value);
        applyDslState(nextState);
        el.dslDialog.close();
        setStatus("DSLから回路を読み込みました。");
        return true;
      } catch (error) {
        const message = error instanceof DslError ? error.message : `Import failed: ${error.message}`;
        setDslStatus(message, true);
        if (error instanceof DslError) selectDslErrorLine(error.line);
        return false;
      }
    }

    function uid() {
      const id = `g${appState.nextId}`;
      appState.nextId += 1;
      return id;
    }

    function blockUid(prefix) {
      const id = `${prefix}${appState.nextId}`;
      appState.nextId += 1;
      return id;
    }

    function clearSelection() {
      appState.selectedId = null;
      appState.selectedDefinitionGate = null;
      appState.selectedDefinitionBlock = null;
      appState.selectedBlockId = null;
    }

    function selectRootGate(id) {
      clearSelection();
      appState.selectedId = id;
    }

    function selectDefinitionGate(definitionId, gateId) {
      clearSelection();
      appState.selectedDefinitionGate = { definitionId, gateId };
      appState.activeDefinitionId = definitionId;
    }

    function selectDefinitionBlock(definitionId, blockId) {
      clearSelection();
      appState.selectedDefinitionBlock = { definitionId, blockId };
      appState.activeDefinitionId = definitionId;
    }

    function selectBlock(id) {
      clearSelection();
      appState.selectedBlockId = id;
      const instance = instanceById(id);
      if (instance) appState.activeDefinitionId = instance.definitionId;
    }

    function selectDefinition(definitionId) {
      clearSelection();
      appState.activeDefinitionId = definitionId;
      appState.placementMode = null;
    }

    function gateMatrixComponents(type, theta, phi = 0, lambda = 0) {
      const s = 1 / Math.sqrt(2);
      const c = Math.cos(theta / 2);
      const st = Math.sin(theta / 2);
      switch (type) {
        case "X":
          return [0, 0, 1, 0, 1, 0, 0, 0];
        case "Y":
          return [0, 0, 0, -1, 0, 1, 0, 0];
        case "Z":
          return [1, 0, 0, 0, 0, 0, -1, 0];
        case "H":
          return [s, 0, s, 0, s, 0, -s, 0];
        case "S":
          return [1, 0, 0, 0, 0, 0, 0, 1];
        case "SDG":
          return [1, 0, 0, 0, 0, 0, 0, -1];
        case "T":
          return [1, 0, 0, 0, 0, 0, Math.SQRT1_2, Math.SQRT1_2];
        case "TDG":
          return [1, 0, 0, 0, 0, 0, Math.SQRT1_2, -Math.SQRT1_2];
        case "RX":
          return [c, 0, 0, -st, 0, -st, c, 0];
        case "RY":
          return [c, 0, -st, 0, st, 0, c, 0];
        case "RZ":
          return [c, -st, 0, 0, 0, 0, c, st];
        case "U": {
          const sum = (phi + lambda) / 2;
          const difference = (phi - lambda) / 2;
          return [
            c * Math.cos(sum), -c * Math.sin(sum),
            -st * Math.cos(difference), st * Math.sin(difference),
            st * Math.cos(difference), st * Math.sin(difference),
            c * Math.cos(sum), c * Math.sin(sum)
          ];
        }
        default:
