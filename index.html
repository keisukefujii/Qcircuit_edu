          return [1, 0, 0, 0, 0, 0, 1, 0];
      }
    }

    function bitMaskForQubit(q) {
      return 1 << (appState.qubits - 1 - q);
    }

    function applySingleGateInPlace(state, op) {
      const mask = bitMaskForQubit(op.target);
      const matrix = gateMatrixComponents(
        op.type,
        op.theta ?? Math.PI / 2,
        op.phi ?? 0,
        op.lambda ?? 0
      );
      const [m00r, m00i, m01r, m01i, m10r, m10i, m11r, m11i] = matrix;

      for (let base = 0; base < state.re.length; base += 1) {
        if ((base & mask) !== 0) continue;
        const i0 = base;
        const i1 = base | mask;
        const a0r = state.re[i0];
        const a0i = state.im[i0];
        const a1r = state.re[i1];
        const a1i = state.im[i1];
        state.re[i0] = m00r * a0r - m00i * a0i + m01r * a1r - m01i * a1i;
        state.im[i0] = m00r * a0i + m00i * a0r + m01r * a1i + m01i * a1r;
        state.re[i1] = m10r * a0r - m10i * a0i + m11r * a1r - m11i * a1i;
        state.im[i1] = m10r * a0i + m10i * a0r + m11r * a1i + m11i * a1r;
      }
    }

    function applyControlledXInPlace(state, op) {
      const targetMask = bitMaskForQubit(op.target);
      const controlMasks = op.controls.map(bitMaskForQubit);

      for (let i = 0; i < state.re.length; i += 1) {
        const controlsOn = controlMasks.every(mask => (i & mask) !== 0);
        const targetOff = (i & targetMask) === 0;
        if (!controlsOn || !targetOff) continue;
        const j = i | targetMask;
        const re = state.re[i];
        const im = state.im[i];
        state.re[i] = state.re[j];
        state.im[i] = state.im[j];
        state.re[j] = re;
        state.im[j] = im;
      }
    }

    function applyControlledZInPlace(state, op) {
      const targetMask = bitMaskForQubit(op.target);
      const controlMasks = op.controls.map(bitMaskForQubit);

      for (let index = 0; index < state.re.length; index += 1) {
        const targetOn = (index & targetMask) !== 0;
        const controlsOn = controlMasks.every(mask => (index & mask) !== 0);
        if (!targetOn || !controlsOn) continue;
        state.re[index] = -state.re[index];
        state.im[index] = -state.im[index];
      }
    }

    function applyControlledPhaseInPlace(state, op) {
      const targetMask = bitMaskForQubit(op.target);
      const controlMasks = op.controls.map(bitMaskForQubit);
      const cosine = Math.cos(op.theta ?? Math.PI / 2);
      const sine = Math.sin(op.theta ?? Math.PI / 2);

      for (let index = 0; index < state.re.length; index += 1) {
        const targetOn = (index & targetMask) !== 0;
        const controlsOn = controlMasks.every(mask => (index & mask) !== 0);
        if (!targetOn || !controlsOn) continue;
        const real = state.re[index];
        const imaginary = state.im[index];
        state.re[index] = real * cosine - imaginary * sine;
        state.im[index] = real * sine + imaginary * cosine;
      }
    }

    function applyPostselectionInPlace(state, op) {
      const targetMask = bitMaskForQubit(op.target);
      const selectedValue = op.value === 1 ? 1 : 0;
      let probability = 0;
      for (let index = 0; index < state.re.length; index += 1) {
        const value = (index & targetMask) === 0 ? 0 : 1;
        if (value !== selectedValue) continue;
        probability += state.re[index] ** 2 + state.im[index] ** 2;
      }

      state.hasPostselection = true;
      state.postselectionProbability *= probability;
      state.stepPostselectionProbability *= probability;
      state.stepPostselections.push({
        target: op.target,
        value: selectedValue,
        probability
      });
      if (probability <= 1e-15) {
        state.re.fill(0);
        state.im.fill(0);
        return;
      }

      const normalization = 1 / Math.sqrt(probability);
      for (let index = 0; index < state.re.length; index += 1) {
        const value = (index & targetMask) === 0 ? 0 : 1;
        if (value !== selectedValue) {
          state.re[index] = 0;
          state.im[index] = 0;
          continue;
        }
        state.re[index] *= normalization;
        state.im[index] *= normalization;
      }
    }

    function initialState() {
      const size = 1 << appState.qubits;
      const state = {
        re: new Float64Array(size),
        im: new Float64Array(size),
        hasPostselection: false,
        postselectionProbability: 1,
        stepPostselections: [],
        stepPostselectionProbability: 1
      };
      state.re[0] = 1;
      return state;
    }

    function cloneState(state) {
      return {
        re: state.re.slice(),
        im: state.im.slice(),
        hasPostselection: state.hasPostselection,
        postselectionProbability: state.postselectionProbability,
        stepPostselections: [...state.stepPostselections],
        stepPostselectionProbability: state.stepPostselectionProbability
      };
    }

    function definitionById(id) {
      return appState.blockDefinitions.find(definition => definition.id === id) || null;
    }

    function instanceById(id) {
      return appState.blockInstances.find(instance => instance.id === id) || null;
    }

    function adjointGateData(gate) {
      const typeMap = { S: "SDG", SDG: "S", T: "TDG", TDG: "T" };
      if (gate.type === "U") {
        return {
          ...gate,
          theta: -(gate.theta || 0),
          phi: -(gate.lambda || 0),
          lambda: -(gate.phi || 0)
        };
      }
      return {
        ...gate,
        type: typeMap[gate.type] || gate.type,
        theta: gateGroups[gate.type] === "rotation" || isControlledPhaseGate(gate.type)
          ? -(gate.theta || 0)
          : gate.theta
      };
    }

    function rootRenderOps() {
      return appState.ops.map(op => ({ ...op, origin: "root", renderId: op.id }));
    }

    function definitionRenderOps(definition) {
      if (!definition) return [];
      return definition.gates.map(gate => ({
        ...gate,
        origin: "definition",
        renderId: gate.id,
        definitionId: definition.id,
        definitionGateId: gate.id
      }));
    }

    function definitionEntries(definition) {
      const gateEntries = definition.gates.map(gate => ({
        kind: "gate",
        step: gate.step,
        row: gate.target,
        value: gate
      }));
      const blockEntries = (definition.blocks || []).map(block => ({
        kind: "block",
        step: block.step,
        row: block.qubit,
        value: block
      }));
      return [...gateEntries, ...blockEntries].sort((a, b) => {
        const stepDelta = a.step - b.step;
        const rowDelta = a.row - b.row;
        return stepDelta || rowDelta || a.kind.localeCompare(b.kind);
      });
    }

    function expandDefinitionOperations(
      definitionId,
      baseQubit,
      adjoint,
      instance,
      output,
      counter,
      path = [],
      stack = []
    ) {
      if (stack.includes(definitionId)) return;
      const definition = definitionById(definitionId);
      if (!definition) return;
      const entries = definitionEntries(definition);
      if (adjoint) entries.reverse();

      for (const entry of entries) {
        if (entry.kind === "block") {
          const nested = entry.value;
          expandDefinitionOperations(
            nested.definitionId,
            baseQubit + nested.qubit,
            Boolean(nested.adjoint) !== Boolean(adjoint),
            instance,
            output,
            counter,
            [...path, nested.id],
            [...stack, definitionId]
          );
          continue;
        }

        const storedGate = entry.value;
        const gate = adjoint ? adjointGateData(storedGate) : storedGate;
        counter.value += 1;
        const renderId = `${instance.id}:${[...path, storedGate.id].join(":")}`;
        output.push({
          ...gate,
          id: renderId,
          renderId,
          step: instance.step,
          target: baseQubit + storedGate.target,
          controls: storedGate.controls.map(q => baseQubit + q),
          origin: "block",
          instanceId: instance.id,
          definitionId,
          definitionGateId: storedGate.id,
          instanceAdjoint: instance.adjoint,
          executionOrder: counter.value,
          instanceOrder: instance.instanceOrder
        });
      }
    }

    function materializedOps() {
      const result = rootRenderOps().map(op => ({ ...op, executionOrder: 0 }));

      for (let instanceIndex = 0; instanceIndex < appState.blockInstances.length; instanceIndex += 1) {
        const instance = appState.blockInstances[instanceIndex];
        if (!definitionById(instance.definitionId)) continue;
        const executionCounter = { value: 0 };
        expandDefinitionOperations(
          instance.definitionId,
          instance.qubit,
          instance.adjoint,
          { ...instance, instanceOrder: instanceIndex },
          result,
          executionCounter
        );
      }
      return result;
    }

    function computeStates() {
      const allOps = materializedOps();
      const opsByStep = Array.from({ length: appState.steps }, () => []);
      for (const op of allOps) {
        if (op.step >= 0 && op.step < appState.steps) opsByStep[op.step].push(op);
      }
      for (const ops of opsByStep) {
        ops.sort((a, b) => {
          const orderDelta = (a.executionOrder || 0) - (b.executionOrder || 0);
          const instanceDelta = (a.instanceOrder || 0) - (b.instanceOrder || 0);
          return orderDelta || instanceDelta || a.target - b.target;
        });
      }

      const stepSignatures = opsByStep.map(ops => ops.map(op => [
        op.type,
        op.target,
        op.controls.join(","),
        String(op.theta ?? 0),
        String(op.phi ?? 0),
        String(op.lambda ?? 0),
        String(op.value ?? 0)
      ].join(":")).join("|"));
      const cache = appState.simulationCache;
      let firstChangedStep = 0;
      let states;

      if (cache.qubits === appState.qubits && cache.states.length) {
        const reusableCount = Math.min(cache.stepSignatures.length, stepSignatures.length);
        while (
          firstChangedStep < reusableCount
          && cache.stepSignatures[firstChangedStep] === stepSignatures[firstChangedStep]
        ) {
          firstChangedStep += 1;
        }
        states = cache.states.slice(0, firstChangedStep + 1);
      } else {
        states = [initialState()];
      }

      if (!states.length) states = [initialState()];
      for (let step = firstChangedStep; step < appState.steps; step += 1) {
        const current = cloneState(states[step]);
        current.stepPostselections = [];
        current.stepPostselectionProbability = 1;
        for (const op of opsByStep[step]) {
          if (op.type === "POSTSELECT") {
            applyPostselectionInPlace(current, op);
          } else if (isControlledPhaseGate(op.type)) {
            applyControlledPhaseInPlace(current, op);
          } else if (isControlledZGate(op.type)) {
            applyControlledZInPlace(current, op);
          } else if (op.type === "CNOT" || op.type === "CCNOT") {
            applyControlledXInPlace(current, op);
          } else {
            applySingleGateInPlace(current, op);
          }
        }
        states.push(current);
      }

      appState.simulationCache = {
        qubits: appState.qubits,
        stepSignatures,
        states
      };
      return states;
    }

    function basisLabel(index) {
      return index.toString(2).padStart(appState.qubits, "0");
    }

    function formatComplex(real, imaginary) {
      const re = Math.abs(real) < 0.0005 ? 0 : real;
      const im = Math.abs(imaginary) < 0.0005 ? 0 : imaginary;
      const reText = re.toFixed(3);
      const imText = Math.abs(im).toFixed(3);
      if (im === 0) return reText;
      if (re === 0) return `${im < 0 ? "-" : ""}${imText}i`;
      return `${reText}${im < 0 ? "-" : "+"}${imText}i`;
    }

    function phaseColor(real, imaginary) {
      const mag = Math.hypot(real, imaginary);
      if (mag < 0.0005) return "var(--zero)";
      const phase = Math.atan2(imaginary, real);
      const hue = ((phase / (2 * Math.PI)) * 360 + 120 + 360) % 360;
      const lightness = hue >= 90 && hue <= 190 ? 42 : hue >= 220 && hue <= 260 ? 58 : 52;
      return `hsl(${hue.toFixed(1)} 78% ${lightness}%)`;
    }

    function usedRows(op) {
      if (isControlledGate(op.type)) {
        return [op.target, ...op.controls];
      }
      return [op.target];
    }

    function footprintRows(op) {
      if (!isControlledGate(op.type)) return [op.target];
      const rows = usedRows(op);
      const min = Math.min(...rows);
      const max = Math.max(...rows);
      return Array.from({ length: max - min + 1 }, (_, index) => min + index);
    }

    function occupiedRowsAt(step, ignoreRenderId = null, ops = rootRenderOps()) {
      const rows = new Set();
      for (const op of ops) {
        if (op.step !== step || op.renderId === ignoreRenderId) continue;
        for (const row of footprintRows(op)) rows.add(row);
      }
      return rows;
    }

    function lineRowsForOp(op) {
      if (!isControlledGate(op.type)) return [];
      const rows = [op.target, ...op.controls];
      const min = Math.min(...rows);
      const max = Math.max(...rows);
      return Array.from({ length: max - min + 1 }, (_, i) => min + i);
    }

    function wireSegmentAt(step, row, ops = rootRenderOps()) {
      for (const op of ops) {
        if (op.step !== step || !isControlledGate(op.type)) continue;
        const rows = [op.target, ...op.controls];
        const min = Math.min(...rows);
        const max = Math.max(...rows);
        if (row < min || row > max) continue;
        return {
          type: op.type,
          segment: row === min ? "wire-start" : row === max ? "wire-end" : "wire-middle"
        };
      }
      return null;
    }

    function lineRowsAt(step, ops = rootRenderOps()) {
      const rows = new Set();
      for (const op of ops) {
        if (op.step !== step) continue;
        for (const row of lineRowsForOp(op)) rows.add(row);
      }
      return rows;
    }

    function opAt(step, row, ops = rootRenderOps()) {
      return ops.find(op => op.step === step && usedRows(op).includes(row)) || null;
    }

    function roleForOp(op, row) {
      if (!op) return "empty";
      if (op.target === row) return "target";
      if (op.controls && op.controls.includes(row)) return "control";
      return "empty";
    }

    function defaultControls(type, target, qubitCount = appState.qubits) {
      if (type === "CNOT" || type === "CZ" || type === "CP") {
        if (qubitCount < 2) return null;
        return [target > 0 ? target - 1 : 1];
      }
      if (type === "CCNOT" || type === "CCZ") {
        if (qubitCount < 3) return null;
        const candidates = [];
        for (let q = target - 1; q >= 0; q -= 1) candidates.push(q);
        for (let q = target + 1; q < qubitCount; q += 1) candidates.push(q);
        return candidates.slice(0, 2).sort((a, b) => a - b);
      }
      return [];
    }

    function basicGateBoundsValid(opCandidate, stepCount, qubitCount) {
      if (opCandidate.target < 0 || opCandidate.target >= qubitCount) return false;
      if (opCandidate.step < 0 || opCandidate.step >= stepCount) return false;
      if (opCandidate.controls) {
        const unique = new Set(opCandidate.controls);
        if (unique.size !== opCandidate.controls.length) return false;
        if (opCandidate.controls.includes(opCandidate.target)) return false;
        if (opCandidate.controls.some(q => q < 0 || q >= qubitCount)) return false;
      }
      return true;
    }

    function blockRect(instance, definition = definitionById(instance.definitionId)) {
      return {
        left: instance.step,
        right: instance.step,
        top: instance.qubit,
        bottom: instance.qubit + definition.height - 1
      };
    }

    function rectsOverlap(a, b) {
      return a.left <= b.right && a.right >= b.left && a.top <= b.bottom && a.bottom >= b.top;
    }

    function instanceAtCell(step, qubit) {
      return appState.blockInstances.find(instance => {
        const rect = blockRect(instance);
        return step >= rect.left && step <= rect.right && qubit >= rect.top && qubit <= rect.bottom;
      }) || null;
    }

    function gateSpanTouchesRect(op, rect) {
      if (op.step < rect.left || op.step > rect.right) return false;
      const rows = usedRows(op);
      const min = Math.min(...rows);
      const max = Math.max(...rows);
      return max >= rect.top && min <= rect.bottom;
    }

    function gateFullyInsideRect(op, rect) {
      return op.step >= rect.left && op.step <= rect.right
        && usedRows(op).every(row => row >= rect.top && row <= rect.bottom);
    }

    function canPlaceBlock(definition, step, qubit, ignoreInstanceId = null, allowRootCapture = false) {
      const candidate = {
        left: step,
        right: step,
        top: qubit,
        bottom: qubit + definition.height - 1
      };
      if (candidate.left < 0 || candidate.top < 0 || candidate.right >= appState.steps || candidate.bottom >= appState.qubits) {
        return false;
      }
      for (const instance of appState.blockInstances) {
        if (instance.id === ignoreInstanceId) continue;
        if (rectsOverlap(candidate, blockRect(instance))) return false;
      }
      for (const op of appState.ops) {
        if (!gateSpanTouchesRect(op, candidate)) continue;
        if (!allowRootCapture || !gateFullyInsideRect(op, candidate)) return false;
      }
      return true;
    }

    function gateIntersectsAnyBlock(op) {
      return appState.blockInstances.some(instance => gateSpanTouchesRect(op, blockRect(instance)));
    }

    function canPlace(opCandidate, ignoreId = null) {
      if (!basicGateBoundsValid(opCandidate, appState.steps, appState.qubits)) return false;
      if (gateIntersectsAnyBlock(opCandidate)) return false;
      const occupied = occupiedRowsAt(opCandidate.step, ignoreId);
      return footprintRows(opCandidate).every(row => !occupied.has(row));
    }

    function canPlaceDefinitionGate(definition, opCandidate, ignoreGateId = null) {
      if (!basicGateBoundsValid(opCandidate, definition.width, definition.height)) return false;
      const occupied = new Set();
      for (const gate of definition.gates) {
        if (gate.id === ignoreGateId || gate.step !== opCandidate.step) continue;
        for (const row of footprintRows(gate)) occupied.add(row);
      }
      for (const block of definition.blocks || []) {
        if (block.step !== opCandidate.step) continue;
        const nestedDefinition = definitionById(block.definitionId);
        if (!nestedDefinition) continue;
        for (let row = block.qubit; row < block.qubit + nestedDefinition.height; row += 1) {
          occupied.add(row);
        }
      }
      return footprintRows(opCandidate).every(row => !occupied.has(row));
    }

    function nestedBlockById(definition, blockId) {
      return (definition?.blocks || []).find(block => block.id === blockId) || null;
    }

    function nestedBlockRect(block, nestedDefinition = definitionById(block.definitionId)) {
      return {
        left: block.step,
        right: block.step,
        top: block.qubit,
        bottom: block.qubit + nestedDefinition.height - 1
      };
    }

    function definitionDependsOn(definitionId, targetDefinitionId, visited = new Set()) {
      if (definitionId === targetDefinitionId) return true;
      if (visited.has(definitionId)) return false;
      visited.add(definitionId);
      const definition = definitionById(definitionId);
      if (!definition) return false;
      return (definition.blocks || []).some(block => (
        definitionDependsOn(block.definitionId, targetDefinitionId, visited)
      ));
    }

    function canPlaceDefinitionBlock(
      definition,
      nestedDefinitionId,
      step,
      qubit,
      ignoreBlockId = null,
      heightOverride = null
    ) {
      const nestedDefinition = definitionById(nestedDefinitionId);
      if (!definition || !nestedDefinition) return false;
      if (definitionDependsOn(nestedDefinition.id, definition.id)) return false;
      const candidate = {
        left: step,
        right: step,
        top: qubit,
        bottom: qubit + (heightOverride ?? nestedDefinition.height) - 1
      };
      if (
        candidate.left < 0
        || candidate.right >= definition.width
        || candidate.top < 0
        || candidate.bottom >= definition.height
      ) {
        return false;
      }
      for (const gate of definition.gates) {
        if (gateSpanTouchesRect(gate, candidate)) return false;
      }
      for (const block of definition.blocks || []) {
        if (block.id === ignoreBlockId) continue;
        if (rectsOverlap(candidate, nestedBlockRect(block))) return false;
      }
      return true;
    }

    function makeGate(type, step, target, source = null, qubitCount = appState.qubits) {
      const group = gateGroups[type];
      if (!group) return null;
      if (isControlledGate(type)) {
        const controls = source?.controls ? [...source.controls] : defaultControls(type, target, qubitCount);
        if (!controls) return null;
        return {
          id: source?.id || uid(),
          type,
          step,
          target,
          controls,
          theta: source?.theta ?? Math.PI / 2,
          phi: source?.phi ?? 0,
          lambda: source?.lambda ?? 0,
          value: source?.value ?? 0
        };
      }
      return {
        id: source?.id || uid(),
        type,
        step,
        target,
        controls: [],
        theta: source?.theta ?? Math.PI / 2,
        phi: source?.phi ?? 0,
        lambda: source?.lambda ?? 0,
        value: source?.value ?? 0
      };
    }

    function setStatus(message, isError = false) {
      el.status.textContent = message;
      el.status.classList.toggle("error", isError);
      if (!message) return;
      window.clearTimeout(setStatus.timeout);
      setStatus.timeout = window.setTimeout(() => {
        el.status.textContent = "";
        el.status.classList.remove("error");
      }, 2600);
    }

    function placeGate(type, step, target) {
      const gate = makeGate(type, step, target);
      if (!gate) {
        setStatus("このゲートには量子ビット数が足りません。", true);
        return false;
      }
      if (!canPlace(gate)) {
        setStatus("同じステップで使っている量子ビットには配置できません。", true);
        return false;
      }
      appState.ops.push(gate);
      selectRootGate(gate.id);
      appState.hoverStep = step + 1;
      render();
      return true;
    }

    function placeDefinitionGate(definitionId, type, step, target) {
      const definition = definitionById(definitionId);
      if (!definition) return false;
      const gate = makeGate(type, step, target, null, definition.height);
      if (!gate) {
        setStatus("このブロックの高さでは control 数が足りません。", true);
        return false;
      }
      if (!canPlaceDefinitionGate(definition, gate)) {
        setStatus("ブロック定義内の同じ位置には配置できません。", true);
        return false;
      }
      definition.gates.push(gate);
      selectDefinitionGate(definition.id, gate.id);
      render();
      return true;
    }

    function movedGate(existing, step, target) {
      const delta = target - existing.target;
      return {
        ...existing,
        step,
        target,
        controls: existing.controls.map(q => q + delta)
      };
    }

    function moveGate(opId, step, target) {
      const existing = appState.ops.find(op => op.id === opId);
      if (!existing) return false;
      const candidate = movedGate(existing, step, target);
      if (!canPlace(candidate, opId)) {
        setStatus("移動先がほかのゲートと重なります。", true);
        return false;
      }
      Object.assign(existing, candidate);
      selectRootGate(opId);
      appState.hoverStep = step + 1;
      render();
      return true;
    }

    function moveDefinitionGate(definitionId, gateId, step, target) {
      const definition = definitionById(definitionId);
      const gate = definition?.gates.find(item => item.id === gateId);
      if (!definition || !gate) return false;
      const candidate = movedGate(gate, step, target);
      if (!canPlaceDefinitionGate(definition, candidate, gate.id)) {
        setStatus("ゲートはブロック定義の範囲内で、空いている位置へ移動してください。", true);
        return false;
      }
      Object.assign(gate, candidate);
      selectDefinitionGate(definition.id, gate.id);
      render();
      return true;
    }

    function placeDefinitionBlock(definitionId, nestedDefinitionId, step, qubit, adjoint = false) {
      const definition = definitionById(definitionId);
      const nestedDefinition = definitionById(nestedDefinitionId);
      if (!definition || !nestedDefinition) return false;
      if (!canPlaceDefinitionBlock(definition, nestedDefinition.id, step, qubit)) {
        const cyclic = definitionDependsOn(nestedDefinition.id, definition.id);
        setStatus(
          cyclic
            ? "ブロック定義の循環参照は作成できません。"
            : "ブロックは定義内の空いている範囲へ配置してください。",
          true
        );
        return false;
      }
      const block = {
        id: blockUid("n"),
        definitionId: nestedDefinition.id,
        step,
        qubit,
        adjoint
      };
      (definition.blocks ||= []).push(block);
      selectDefinitionBlock(definition.id, block.id);
      render();
      return true;
    }

    function moveDefinitionBlock(definitionId, blockId, step, qubit) {
      const definition = definitionById(definitionId);
      const block = nestedBlockById(definition, blockId);
      if (!definition || !block) return false;
      if (!canPlaceDefinitionBlock(definition, block.definitionId, step, qubit, block.id)) {
        setStatus("ブロックは定義内の空いている範囲へ移動してください。", true);
        return false;
      }
      block.step = step;
      block.qubit = qubit;
      selectDefinitionBlock(definition.id, block.id);
      render();
      return true;
    }

    function makeBlockDefinition() {
      return {
        id: blockUid("d"),
        name: `U${appState.nextBlockNumber}`,
        width: 4,
        height: Math.min(2, appState.qubits),
        color: randomBlockColor(),
        gates: [],
        blocks: []
      };
    }

    function ensureActiveBlockDefinition() {
      const active = definitionById(appState.activeDefinitionId);
      if (active) return active;
      if (!appState.blockDefinitions.length) {
        const definition = makeBlockDefinition();
        appState.nextBlockNumber += 1;
        appState.blockDefinitions.push(definition);
      }
      appState.activeDefinitionId = appState.blockDefinitions[0].id;
      return appState.blockDefinitions[0];
    }

    function createBlockDefinition() {
      const definition = makeBlockDefinition();
      appState.nextBlockNumber += 1;
      appState.blockDefinitions.push(definition);
      selectDefinition(definition.id);
      setStatus(`${definition.name} を作成しました。`);
      render();
      return definition;
    }

    function placeBlockCopy(definitionId, step, qubit, adjoint = false) {
      const definition = definitionById(definitionId);
      if (!definition) return false;
      if (!canPlaceBlock(definition, step, qubit)) {
        setStatus("リンク配置がほかの回路要素または範囲外に重なります。", true);
        return false;
      }
      const instance = {
        id: blockUid("b"),
        definitionId,
        step,
        qubit,
        adjoint
      };
      appState.blockInstances.push(instance);
      selectBlock(instance.id);
      appState.placementMode = null;
      appState.hoverStep = step + 1;
      setStatus(`${definition.name}${adjoint ? "†" : ""} をリンク配置しました。`);
      render();
      return true;
    }

    function moveBlock(instanceId, step, qubit) {
      const instance = instanceById(instanceId);
      const definition = instance && definitionById(instance.definitionId);
      if (!instance || !definition) return false;
      if (!canPlaceBlock(definition, step, qubit, instance.id)) {
        setStatus("ブロックの移動先がほかの回路要素または範囲外に重なります。", true);
        return false;
      }
      instance.step = step;
      instance.qubit = qubit;
      selectBlock(instance.id);
      appState.hoverStep = step + 1;
      render();
      return true;
    }

    function deleteSelected() {
      if (appState.selectedId) {
        appState.ops = appState.ops.filter(op => op.id !== appState.selectedId);
      } else if (appState.selectedDefinitionGate) {
        const definition = definitionById(appState.selectedDefinitionGate.definitionId);
        if (definition) {
          definition.gates = definition.gates.filter(gate => gate.id !== appState.selectedDefinitionGate.gateId);
        }
      } else if (appState.selectedDefinitionBlock) {
        const definition = definitionById(appState.selectedDefinitionBlock.definitionId);
        if (definition) {
          definition.blocks = (definition.blocks || []).filter(
            block => block.id !== appState.selectedDefinitionBlock.blockId
          );
        }
      } else if (appState.selectedBlockId) {
        const instance = instanceById(appState.selectedBlockId);
        if (!instance) return;
        appState.blockInstances = appState.blockInstances.filter(item => item.id !== instance.id);
      } else {
        return;
      }
      clearSelection();
      render();
    }

    function deleteActiveDefinition() {
      const definition = definitionById(appState.activeDefinitionId);
      if (!definition) return;
      appState.blockDefinitions = appState.blockDefinitions.filter(item => item.id !== definition.id);
      appState.blockInstances = appState.blockInstances.filter(item => item.definitionId !== definition.id);
      for (const owner of appState.blockDefinitions) {
        owner.blocks = (owner.blocks || []).filter(block => block.definitionId !== definition.id);
      }
      if (appState.selectedDefinitionGate?.definitionId === definition.id) appState.selectedDefinitionGate = null;
      if (
        appState.selectedDefinitionBlock?.definitionId === definition.id
        || appState.selectedDefinitionBlock
          && !nestedBlockById(
            definitionById(appState.selectedDefinitionBlock.definitionId),
            appState.selectedDefinitionBlock.blockId
          )
      ) {
        appState.selectedDefinitionBlock = null;
      }
      const nextDefinition = appState.blockDefinitions[0] || null;
      appState.activeDefinitionId = nextDefinition?.id || null;
      clearSelection();
      setStatus(`${definition.name} の定義と配置を削除しました。`);
      render();
    }

    function setExample() {
      appState.qubits = 2;
      appState.steps = 8;
      appState.blockDefinitions = [];
      appState.blockInstances = [];
      appState.activeDefinitionId = null;
      appState.nextBlockNumber = 1;
      appState.placementMode = null;
      appState.postselection = null;
      appState.ops = [
        { id: uid(), type: "H", step: 0, target: 0, controls: [], theta: Math.PI / 2 },
        { id: uid(), type: "CNOT", step: 1, target: 1, controls: [0], theta: Math.PI / 2 }
      ];
      selectRootGate(appState.ops[1].id);
      appState.hoverStep = 2;
      render();
    }

    function setGroverExample() {
      applyDslState(buildStateFromDsl(GROVER_EXAMPLE_DSL));
      setStatus("5-qubit Grover example を読み込みました。");
    }

    function setPeriodFindingExample() {
      applyDslState(buildStateFromDsl(PERIOD_FINDING_EXAMPLE_DSL));
      setStatus("N=15, a=2 の周期を逆QFTで抽出する回路を読み込みました。");
    }

    function randomSu2Angles() {
      return {
        theta: 2 * Math.asin(Math.sqrt(Math.random())),
        phi: (Math.random() * 2 - 1) * Math.PI,
        lambda: (Math.random() * 2 - 1) * Math.PI
      };
    }

    function setRandomCircuitExample() {
      appState.qubits = 5;
      appState.steps = 12;
      appState.ops = [];
      appState.blockDefinitions = [];
      appState.blockInstances = [];
      appState.activeDefinitionId = null;
      appState.nextBlockNumber = 1;
      appState.placementMode = null;
      appState.postselection = null;
      clearSelection();

      for (let layer = 0; layer < 6; layer += 1) {
        const unitaryStep = layer * 2;
        const entanglingStep = unitaryStep + 1;
        for (let qubit = 0; qubit < appState.qubits; qubit += 1) {
          appState.ops.push(makeGate(
            "U",
            unitaryStep,
            qubit,
            randomSu2Angles(),
            appState.qubits
          ));
        }
        const pairOffset = layer % 2;
        for (let control = pairOffset; control + 1 < appState.qubits; control += 2) {
          appState.ops.push(makeGate(
            "CZ",
            entanglingStep,
            control + 1,
            { controls: [control] },
            appState.qubits
          ));
        }
      }

      appState.hoverStep = appState.steps;
      appState.simulationCache = { qubits: null, stepSignatures: [], states: [] };
      render();
      setStatus("ランダム SU(2) + CZ brickwork circuit を生成しました。");
    }

    function clearCircuit() {
      appState.ops = [];
      appState.blockDefinitions = [];
      appState.blockInstances = [];
      appState.activeDefinitionId = null;
      appState.nextBlockNumber = 1;
      appState.placementMode = null;
      appState.postselection = null;
      clearSelection();
      appState.hoverStep = 0;
      render();
    }

    function render() {
      hideBlockHoverPreview();
      ensureActiveBlockDefinition();
      if (setHoverStep.frame) {
        window.cancelAnimationFrame(setHoverStep.frame);
        setHoverStep.frame = null;
      }
      appState.pendingHoverStep = appState.hoverStep;
      if (document.activeElement !== el.stepCountInput) el.stepCountInput.value = String(appState.steps);
      renderCircuit();
      renderVector();
      renderInspector();
      renderBlockLibrary();
      renderBlockDefinitionEditor();
    }

    function setHoverStep(step) {
      if (appState.pointerDrag?.active) return;
      appState.pendingHoverStep = step;
      if (setHoverStep.frame) return;
      setHoverStep.frame = window.requestAnimationFrame(() => {
        setHoverStep.frame = null;
        const nextStep = appState.pendingHoverStep;
        if (appState.hoverStep === nextStep) return;
        appState.hoverStep = nextStep;
        renderVector();
        updateCircuitHover();
      });
    }

    function updateCircuitHover() {
      el.grid.querySelectorAll(".step-header").forEach(header => {
        header.classList.toggle("is-hovered", Number(header.dataset.step) === appState.hoverStep);
      });
      el.grid.querySelectorAll(".drop-cell").forEach(cell => {
        cell.classList.toggle("is-hovered-step", Number(cell.dataset.step) + 1 === appState.hoverStep);
      });
    }

    function renderCircuit() {
      el.grid.style.setProperty("--steps", appState.steps);
      el.grid.style.setProperty("--qubits", appState.qubits);
      el.grid.innerHTML = "";
      const allOps = rootRenderOps();

      const corner = document.createElement("div");
      corner.className = "corner-cell";
      corner.addEventListener("mouseenter", () => setHoverStep(0));
      el.grid.appendChild(corner);

      for (let step = 0; step < appState.steps; step += 1) {
        const header = document.createElement("div");
        header.className = `step-header${appState.hoverStep === step + 1 ? " is-hovered" : ""}`;
        header.dataset.step = String(step + 1);
        header.textContent = step + 1;
        header.addEventListener("mouseenter", () => setHoverStep(step + 1));
        el.grid.appendChild(header);
      }

      for (let q = 0; q < appState.qubits; q += 1) {
        const label = document.createElement("div");
        label.className = "qubit-label";
        label.textContent = `q${q}`;
        label.addEventListener("mouseenter", () => setHoverStep(0));
        el.grid.appendChild(label);

        for (let step = 0; step < appState.steps; step += 1) {
          const cell = document.createElement("div");
          const wire = wireSegmentAt(step, q, allOps);
          cell.className = "drop-cell";
          if (wire) {
            cell.classList.add("vertical-wire", wire.segment);
            cell.style.setProperty("--wire-color", gateWireCssValue(wire.type));
          }
          if (appState.hoverStep === step + 1) cell.classList.add("is-hovered-step");
          cell.dataset.step = String(step);
          cell.dataset.qubit = String(q);
          cell.dataset.scope = "circuit";
          cell.addEventListener("mouseenter", () => setHoverStep(step + 1));
          cell.addEventListener("click", () => {
            if (!appState.placementMode || appState.suppressClick) return;
            placeBlockCopy(
              appState.placementMode.definitionId,
              step,
              q,
              appState.placementMode.adjoint
            );
          });
          wireDropHandlers(cell, step, q);

          const op = opAt(step, q, allOps);
          if (op) {
            const role = roleForOp(op, q);
            const gateNode = renderGateNode(op, role);
            cell.appendChild(gateNode);
          }
          el.grid.appendChild(cell);
        }
      }
      renderBlockOverlays();
    }

    function renderGateNode(op, role) {
      let node;
      if (isControlledGate(op.type)) {
        if (role === "control") {
          node = document.createElement("button");
          node.className = "control-dot";
          node.type = "button";
          node.setAttribute("aria-label", `${op.type} control`);
        } else {
          node = document.createElement("button");
          const phaseTarget = isControlledZGate(op.type) || isControlledPhaseGate(op.type);
          node.className = `target-symbol${phaseTarget ? " phase-target" : ""}`;
          node.type = "button";
          if (isControlledZGate(op.type)) node.textContent = "Z";
          if (isControlledPhaseGate(op.type)) node.textContent = "P";
          node.setAttribute("aria-label", `${op.type} target`);
        }
      } else {
        node = document.createElement("button");
        node.className = `placed-gate ${gateGroups[op.type]}`;
        node.type = "button";
        node.textContent = gateLabel(op.type, op.value);
        node.setAttribute("aria-label", op.type === "POSTSELECT"
          ? `postselect q${op.target} to ${op.value === 1 ? 1 : 0}`
          : gateLabel(op.type));
      }
      applyGateColor(node, op.type);
      const selectedRoot = op.origin === "root" && op.id === appState.selectedId;
      const selectedDefinition = op.origin === "definition"
        && appState.selectedDefinitionGate?.definitionId === op.definitionId
        && appState.selectedDefinitionGate?.gateId === op.definitionGateId;
      if (selectedRoot || selectedDefinition) node.classList.add("selected");
      node.draggable = false;
      node.addEventListener("pointerdown", event => {
        if (op.origin === "root") {
          startPointerDrag({ source: "placed", opId: op.id, type: op.type, value: op.value }, event);
        } else if (op.origin === "definition") {
          startPointerDrag({
            source: "block-gate",
            definitionId: op.definitionId,
            gateId: op.definitionGateId,
            type: op.type,
            value: op.value
          }, event);
        }
      });
      if (op.origin === "root") node.addEventListener("mouseenter", () => setHoverStep(op.step + 1));
      node.addEventListener("click", event => {
        event.stopPropagation();
        if (appState.suppressClick) {
          appState.suppressClick = false;
          return;
        }
        if (op.origin === "root") {
          selectRootGate(op.id);
          appState.hoverStep = op.step + 1;
        } else if (op.origin === "definition") {
          selectDefinitionGate(op.definitionId, op.definitionGateId);
        }
        render();
      });
      node.addEventListener("dblclick", event => {
        event.stopPropagation();
        if (op.type === "POSTSELECT") {
          const editable = op.origin === "root"
            ? appState.ops.find(item => item.id === op.id)
            : op.origin === "definition"
              ? definitionById(op.definitionId)?.gates.find(item => item.id === op.definitionGateId)
              : null;
          if (!editable) return;
          editable.value = editable.value === 1 ? 0 : 1;
          if (op.origin === "root") selectRootGate(op.id);
          else selectDefinitionGate(op.definitionId, op.definitionGateId);
          render();
          return;
        }
        if (
          gateGroups[op.type] === "rotation"
          || gateGroups[op.type] === "unitary"
          || isControlledPhaseGate(op.type)
        ) {
          const editable = op.origin === "root"
            ? appState.ops.find(item => item.id === op.id)
            : op.origin === "definition"
              ? definitionById(op.definitionId)?.gates.find(item => item.id === op.definitionGateId)
              : null;
          if (!editable) return;
          editable.theta = ((editable.theta || 0) + Math.PI / 2) % (2 * Math.PI);
          if (op.origin === "root") selectRootGate(op.id);
          else selectDefinitionGate(op.definitionId, op.definitionGateId);
          render();
        }
      });
      return node;
    }

    function previewSvgElement(name, attributes = {}, text = "") {
      const node = document.createElementNS("http://www.w3.org/2000/svg", name);
      for (const [key, value] of Object.entries(attributes)) {
        node.setAttribute(key, String(value));
      }
      if (text) node.textContent = text;
      return node;
    }

    function renderBlockPreviewSvg(definition, adjoint = false) {
      const labelWidth = 30;
      const headerHeight = 23;
      const cellWidth = 46;
      const cellHeight = 38;
      const rightPadding = 10;
      const width = labelWidth + definition.width * cellWidth + rightPadding;
      const height = headerHeight + definition.height * cellHeight + 7;
      const svg = previewSvgElement("svg", {
        viewBox: `0 0 ${width} ${height}`,
        width,
        height,
        role: "img",
        "aria-label": `${definition.name}${adjoint ? " adjoint" : ""} block contents`
      });
      svg.style.fontFamily = "inherit";

      for (let step = 0; step < definition.width; step += 1) {
        const displayedStep = adjoint ? definition.width - step : step + 1;
        const x = labelWidth + step * cellWidth + cellWidth / 2;
        svg.appendChild(previewSvgElement("text", {
          x,
          y: 13,
          fill: "var(--muted)",
          "font-size": 9,
          "font-weight": 600,
          "text-anchor": "middle"
        }, displayedStep));
      }

      for (let qubit = 0; qubit < definition.height; qubit += 1) {
        const y = headerHeight + qubit * cellHeight + cellHeight / 2;
        svg.appendChild(previewSvgElement("text", {
          x: labelWidth - 7,
          y: y + 3,
          fill: "var(--muted)",
          "font-size": 9,
          "font-weight": 700,
          "text-anchor": "end"
        }, `q${qubit}`));
        svg.appendChild(previewSvgElement("line", {
          x1: labelWidth,
          y1: y,
          x2: width - rightPadding,
          y2: y,
          stroke: "var(--wire)",
          "stroke-width": 1.5
        }));
      }

      for (const block of definition.blocks || []) {
        const nestedDefinition = definitionById(block.definitionId);
        if (!nestedDefinition) continue;
        const nestedAdjoint = Boolean(block.adjoint) !== Boolean(adjoint);
        const step = adjoint ? definition.width - 1 - block.step : block.step;
        const x = labelWidth + step * cellWidth + cellWidth / 2;
        const y = headerHeight + block.qubit * cellHeight + 4;
        const blockHeight = nestedDefinition.height * cellHeight - 8;
        const color = ensureBlockColor(nestedDefinition);
        svg.appendChild(previewSvgElement("rect", {
          x: x - 17,
          y,
          width: 34,
          height: blockHeight,
          rx: 3,
          fill: color.fill,
          stroke: color.border,
          "stroke-width": 1.5,
          "stroke-dasharray": nestedAdjoint ? "2 2" : "4 3"
        }));
        const nestedLabel = `${nestedDefinition.name}${nestedAdjoint ? "†" : ""}`;
        const text = previewSvgElement("text", {
          x,
          y: y + blockHeight / 2 + 3,
          fill: color.ink,
          "font-size": 8,
          "font-weight": 700,
          "text-anchor": "middle"
        }, nestedLabel);
        if (nestedLabel.length > 5) {
          text.setAttribute("textLength", "29");
          text.setAttribute("lengthAdjust", "spacingAndGlyphs");
        }
        svg.appendChild(text);
      }

      for (const storedGate of definition.gates) {
        const gate = adjoint ? adjointGateData(storedGate) : storedGate;
        const step = adjoint ? definition.width - 1 - storedGate.step : storedGate.step;
        const x = labelWidth + step * cellWidth + cellWidth / 2;
        const targetY = headerHeight + gate.target * cellHeight + cellHeight / 2;

        if (isControlledGate(gate.type)) {
          const rows = [gate.target, ...gate.controls];
          const topY = headerHeight + Math.min(...rows) * cellHeight + cellHeight / 2;
          const bottomY = headerHeight + Math.max(...rows) * cellHeight + cellHeight / 2;
          const wireColor = gateWireCssValue(gate.type);
          svg.appendChild(previewSvgElement("line", {
            x1: x,
            y1: topY,
            x2: x,
            y2: bottomY,
            stroke: wireColor,
            "stroke-width": 2
          }));
          for (const control of gate.controls) {
            const controlY = headerHeight + control * cellHeight + cellHeight / 2;
            svg.appendChild(previewSvgElement("circle", {
              cx: x,
              cy: controlY,
              r: 4.5,
              fill: wireColor
            }));
          }
          svg.appendChild(previewSvgElement("circle", {
            cx: x,
            cy: targetY,
            r: 11,
            fill: "var(--surface)",
            stroke: wireColor,
            "stroke-width": 2
          }));
          if (isControlledZGate(gate.type) || isControlledPhaseGate(gate.type)) {
            svg.appendChild(previewSvgElement("text", {
              x,
              y: targetY + 3.5,
              fill: wireColor,
              "font-size": 9,
              "font-weight": 800,
              "text-anchor": "middle"
            }, isControlledZGate(gate.type) ? "Z" : "P"));
          } else {
            svg.appendChild(previewSvgElement("line", {
              x1: x - 6,
              y1: targetY,
              x2: x + 6,
              y2: targetY,
              stroke: wireColor,
              "stroke-width": 1.6
            }));
            svg.appendChild(previewSvgElement("line", {
              x1: x,
              y1: targetY - 6,
              x2: x,
              y2: targetY + 6,
              stroke: wireColor,
              "stroke-width": 1.6
            }));
          }
          continue;
        }

        const label = gateLabel(gate.type, gate.value);
        const gateWidth = gate.type === "POSTSELECT" ? 38 : 29;
        svg.appendChild(previewSvgElement("rect", {
          x: x - gateWidth / 2,
          y: targetY - 12,
          width: gateWidth,
          height: 24,
          rx: 3,
          fill: gateCssValue(gate.type),
          stroke: "rgba(54, 68, 91, 0.26)",
          "stroke-width": 1
        }));
        const labelNode = previewSvgElement("text", {
          x,
          y: targetY + 3.5,
          fill: "var(--gate-ink)",
          "font-size": gate.type === "POSTSELECT" ? 6.5 : 9,
          "font-weight": 800,
          "text-anchor": "middle"
        }, label);
        if (label.length > 5 && gate.type !== "POSTSELECT") {
          labelNode.setAttribute("textLength", String(gateWidth - 6));
          labelNode.setAttribute("lengthAdjust", "spacingAndGlyphs");
        }
        svg.appendChild(labelNode);
      }
      return svg;
    }

    function positionBlockHoverPreview(anchor) {
      if (!anchor || el.blockHoverPreview.hidden) return;
      const anchorRect = anchor.getBoundingClientRect();
      const previewRect = el.blockHoverPreview.getBoundingClientRect();
      const padding = 12;
      const gap = 9;
      let left = anchorRect.right + gap;
      if (left + previewRect.width > window.innerWidth - padding) {
        left = anchorRect.left - previewRect.width - gap;
      }
      left = Math.max(padding, Math.min(left, window.innerWidth - previewRect.width - padding));
      let top = anchorRect.top + (anchorRect.height - previewRect.height) / 2;
      top = Math.max(padding, Math.min(top, window.innerHeight - previewRect.height - padding));
      el.blockHoverPreview.style.left = `${Math.round(left)}px`;
      el.blockHoverPreview.style.top = `${Math.round(top)}px`;
    }

    function showBlockHoverPreview(anchor, definition, adjoint = false) {
      if (!anchor || !definition || appState.pointerDrag?.active) return;
      const preview = el.blockHoverPreview;
      preview.innerHTML = "";
      applyBlockColor(preview, definition);

      const header = document.createElement("div");
      header.className = "block-hover-preview-header";
      const title = document.createElement("strong");
      title.textContent = `${definition.name}${adjoint ? "†" : ""}`;
      const size = document.createElement("span");
      size.textContent = `${definition.width} steps · ${definition.height} qubits`;
      header.append(title, size);
      preview.append(header, renderBlockPreviewSvg(definition, adjoint));
      preview.setAttribute("aria-label", `${title.textContent} block contents`);
      preview.hidden = false;
      showBlockHoverPreview.anchor = anchor;
      positionBlockHoverPreview(anchor);
    }

    function hideBlockHoverPreview(anchor = null) {
      if (anchor && showBlockHoverPreview.anchor !== anchor) return;
      el.blockHoverPreview.hidden = true;
      el.blockHoverPreview.innerHTML = "";
      showBlockHoverPreview.anchor = null;
    }

    function bindBlockHoverPreview(
      anchor,
      definition,
      adjoint = false,
      onEnter = null,
      pointerEvents = true
    ) {
      anchor.setAttribute("aria-describedby", "blockHoverPreview");
      if (pointerEvents) {
        anchor.addEventListener("pointerenter", () => {
          if (onEnter) onEnter();
          showBlockHoverPreview(anchor, definition, adjoint);
        });
        anchor.addEventListener("pointerleave", () => hideBlockHoverPreview(anchor));
      }
      anchor.addEventListener("focus", () => showBlockHoverPreview(anchor, definition, adjoint));
      anchor.addEventListener("blur", () => hideBlockHoverPreview(anchor));
      anchor.addEventListener("pointerdown", () => hideBlockHoverPreview(anchor));
    }

    function renderBlockOverlays() {
      for (const instance of appState.blockInstances) {
        const definition = definitionById(instance.definitionId);
        if (!definition) continue;
        const overlay = document.createElement("div");
        overlay.className = "block-overlay";
        overlay.classList.add("linked", "previewable");
        if (instance.adjoint) overlay.classList.add("adjoint");
        if (instance.id === appState.selectedBlockId) overlay.classList.add("selected");
        overlay.dataset.blockId = instance.id;
        applyBlockColor(overlay, definition);
        setBlockOverlayGeometry(overlay, instance.step, instance.qubit, 1, definition.height);
        bindBlockHoverPreview(
          overlay,
          definition,
          instance.adjoint,
          () => setHoverStep(instance.step + 1)
        );

        const caption = document.createElement("button");
        caption.type = "button";
        caption.className = "block-caption";
        caption.textContent = `${definition.name}${instance.adjoint ? "†" : ""}`;
        caption.setAttribute("aria-label", `${definition.name}${instance.adjoint ? " adjoint" : ""} block`);
        bindBlockHoverPreview(
          caption,
          definition,
          instance.adjoint,
          null,
          false
        );
        caption.addEventListener("pointerdown", event => {
          startPointerDrag({ source: "block", blockId: instance.id }, event);
        });
        caption.addEventListener("click", event => {
          event.stopPropagation();
          if (appState.suppressClick) {
            appState.suppressClick = false;
            return;
          }
          selectBlock(instance.id);
          appState.hoverStep = instance.step + 1;
          render();
        });
        overlay.appendChild(caption);
        el.grid.appendChild(overlay);
      }
    }

    function renderDefinitionBlockOverlays(definition, grid) {
      for (const block of definition.blocks || []) {
        const nestedDefinition = definitionById(block.definitionId);
        if (!nestedDefinition) continue;
        const overlay = document.createElement("div");
        overlay.className = "block-overlay linked nested previewable";
        if (block.adjoint) overlay.classList.add("adjoint");
        if (
          appState.selectedDefinitionBlock?.definitionId === definition.id
          && appState.selectedDefinitionBlock?.blockId === block.id
        ) {
          overlay.classList.add("selected");
        }
        overlay.dataset.definitionBlockId = block.id;
        applyBlockColor(overlay, nestedDefinition);
        setBlockOverlayGeometry(overlay, block.step, block.qubit, 1, nestedDefinition.height);
        bindBlockHoverPreview(overlay, nestedDefinition, block.adjoint);

        const caption = document.createElement("button");
        caption.type = "button";
        caption.className = "block-caption";
        caption.textContent = `${nestedDefinition.name}${block.adjoint ? "†" : ""}`;
        caption.setAttribute(
          "aria-label",
          `${nestedDefinition.name}${block.adjoint ? " adjoint" : ""} nested block`
        );
        bindBlockHoverPreview(caption, nestedDefinition, block.adjoint, null, false);
        caption.addEventListener("pointerdown", event => {
          startPointerDrag({
            source: "definition-block",
            definitionId: definition.id,
            blockId: block.id
          }, event);
        });
        caption.addEventListener("click", event => {
          event.stopPropagation();
          if (appState.suppressClick) {
            appState.suppressClick = false;
            return;
          }
          selectDefinitionBlock(definition.id, block.id);
          render();
        });
        overlay.appendChild(caption);
        grid.appendChild(overlay);
      }
    }

    function setBlockOverlayGeometry(node, step, qubit, width, height) {
      node.style.left = `${gridMetrics.labelWidth + step * gridMetrics.cellWidth + 3}px`;
      node.style.top = `${gridMetrics.headerHeight + qubit * gridMetrics.cellHeight + 3}px`;
      node.style.width = `${width * gridMetrics.cellWidth - 6}px`;
      node.style.height = `${height * gridMetrics.cellHeight - 6}px`;
    }

    function renderBlockLibrary() {
      renderBlockLibraryInto(el.blockLibrary);
      renderBlockLibraryInto(el.blockEditorLibrary);
    }

    function renderBlockLibraryInto(container) {
      container.innerHTML = "";
      const label = document.createElement("span");
      label.className = "block-library-label";
      label.textContent = appState.blockDefinitions.length ? "Blocks" : "No blocks defined";
      container.appendChild(label);
      for (const definition of appState.blockDefinitions) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "block-token";
        if (definition.id === appState.activeDefinitionId) button.classList.add("selected");
        applyBlockColor(button, definition);
        button.draggable = false;
        button.textContent = `${definition.name} ${definition.width}×${definition.height}`;
        bindBlockHoverPreview(button, definition);
        button.addEventListener("pointerdown", event => {
          startPointerDrag({ source: "block-library", definitionId: definition.id }, event);
        });
        button.addEventListener("click", () => {
          if (appState.suppressClick) {
            appState.suppressClick = false;
            return;
          }
          selectDefinition(definition.id);
          render();
        });
        container.appendChild(button);
      }
    }

    function renderBlockDefinitionEditor() {
      const definition = definitionById(appState.activeDefinitionId);
      const controls = [
        el.blockNameInput,
        el.addBlockStepButton,
        el.removeBlockStepButton,
        el.addBlockQubitButton,
        el.removeBlockQubitButton,
        el.placeBlockButton,
        el.placeAdjointBlockButton,
        el.deleteBlockDefinitionButton
      ];
      for (const control of controls) control.disabled = !definition;

      if (!definition) {
        el.blockDefinitionTitle.textContent = "No block selected";
        el.blockDefinitionEmpty.hidden = false;
        el.blockEditorScroller.hidden = true;
        el.blockNameInput.value = "";
        el.blockDefinitionGrid.innerHTML = "";
        return;
      }

      el.blockDefinitionTitle.textContent = `${definition.name} · ${definition.width} steps × ${definition.height} qubits`;
      el.blockDefinitionEmpty.hidden = true;
      el.blockEditorScroller.hidden = false;
      if (document.activeElement !== el.blockNameInput) el.blockNameInput.value = definition.name;
      el.removeBlockStepButton.disabled = definition.width <= 1;
      el.addBlockStepButton.disabled = definition.width >= MAX_BLOCK_STEPS;
      el.removeBlockQubitButton.disabled = definition.height <= 1;
      el.addBlockQubitButton.disabled = definition.height >= appState.qubits;

      const grid = el.blockDefinitionGrid;
      const allOps = definitionRenderOps(definition);
      applyBlockColor(grid, definition);
      grid.style.setProperty("--steps", definition.width);
      grid.style.setProperty("--qubits", definition.height);
      grid.innerHTML = "";

      const corner = document.createElement("div");
      corner.className = "corner-cell";
      grid.appendChild(corner);

      for (let step = 0; step < definition.width; step += 1) {
        const header = document.createElement("div");
        header.className = "step-header";
        header.textContent = step + 1;
        grid.appendChild(header);
      }

      for (let q = 0; q < definition.height; q += 1) {
        const label = document.createElement("div");
        label.className = "qubit-label";
        label.textContent = `q${q}`;
        grid.appendChild(label);

        for (let step = 0; step < definition.width; step += 1) {
          const cell = document.createElement("div");
          const wire = wireSegmentAt(step, q, allOps);
          cell.className = "drop-cell";
          if (wire) {
            cell.classList.add("vertical-wire", wire.segment);
            cell.style.setProperty("--wire-color", gateWireCssValue(wire.type));
          }
          cell.dataset.step = String(step);
          cell.dataset.qubit = String(q);
          cell.dataset.scope = "definition";
          cell.dataset.definitionId = definition.id;
          const op = opAt(step, q, allOps);
          if (op) cell.appendChild(renderGateNode(op, roleForOp(op, q)));
          grid.appendChild(cell);
        }
      }

      renderDefinitionBlockOverlays(definition, grid);

      for (const cornerName of ["nw", "ne", "sw", "se"]) {
        const handle = document.createElement("button");
        handle.type = "button";
        handle.className = "block-handle";
        handle.dataset.corner = cornerName;
        handle.setAttribute("aria-label", `${definition.name} ${cornerName} resize handle`);
        handle.addEventListener("pointerdown", event => {
          event.stopPropagation();
          startPointerDrag({
            source: "definition-resize",
            definitionId: definition.id,
            corner: cornerName,
            startWidth: definition.width,
            startHeight: definition.height
          }, event);
        });
        handle.addEventListener("click", event => event.stopPropagation());
        grid.appendChild(handle);
      }
    }

    function wireDropHandlers(cell, step, q) {
      cell.addEventListener("dragover", event => {
        event.preventDefault();
        cell.classList.add("drag-over");
        const payload = readDragPayload(event);
        const candidate = candidateForDrop(payload, step, q);
        cell.classList.toggle("invalid-drop", !candidate.valid);
        event.dataTransfer.dropEffect = payload?.source === "placed" ? "move" : "copy";
      });
      cell.addEventListener("dragleave", () => {
        cell.classList.remove("drag-over", "invalid-drop");
      });
      cell.addEventListener("drop", event => {
        event.preventDefault();
        cell.classList.remove("drag-over", "invalid-drop");
        const payload = readDragPayload(event);
        if (!payload) return;
        if (payload.source === "palette") {
          placeGate(payload.type, step, q);
        } else if (payload.source === "placed") {
          moveGate(payload.opId, step, q);
        }
      });
    }

    function readDragPayload(event) {
      try {
        const raw = event.dataTransfer.getData("text/plain");
        return raw ? JSON.parse(raw) : appState.dragPayload;
      } catch {
        return appState.dragPayload;
      }
    }

    function candidateForDrop(payload, step, q, scope = "circuit", definitionId = null) {
      if (!payload) return { valid: false };
      if (scope === "definition") {
        const definition = definitionById(definitionId);
        if (!definition) return { valid: false };
        if (payload.source === "palette") {
          const gate = makeGate(payload.type, step, q, null, definition.height);
          return { valid: Boolean(gate && canPlaceDefinitionGate(definition, gate)) };
        }
        if (payload.source === "block-gate" && payload.definitionId === definition.id) {
          const existing = definition.gates.find(gate => gate.id === payload.gateId);
          if (!existing) return { valid: false };
          const gate = movedGate(existing, step, q);
          return { valid: canPlaceDefinitionGate(definition, gate, existing.id) };
        }
        if (payload.source === "block-library") {
          return {
            valid: canPlaceDefinitionBlock(definition, payload.definitionId, step, q)
          };
        }
        if (payload.source === "definition-block" && payload.definitionId === definition.id) {
          const block = nestedBlockById(definition, payload.blockId);
          return {
            valid: Boolean(
              block
              && canPlaceDefinitionBlock(definition, block.definitionId, step, q, block.id)
            )
          };
        }
        return { valid: false };
      }

      if (payload.source === "palette") {
        const gate = makeGate(payload.type, step, q);
        return { valid: Boolean(gate && canPlace(gate)) };
      }
      if (payload.source === "placed") {
        const existing = appState.ops.find(op => op.id === payload.opId);
        if (!existing) return { valid: false };
        const gate = movedGate(existing, step, q);
        return { valid: Boolean(gate && canPlace(gate, existing.id)) };
      }
      if (payload.source === "block-library") {
        const definition = definitionById(payload.definitionId);
        return { valid: Boolean(definition && canPlaceBlock(definition, step, q)) };
      }
      if (payload.source === "block") {
        const instance = instanceById(payload.blockId);
        const definition = instance && definitionById(instance.definitionId);
        return { valid: Boolean(definition && canPlaceBlock(definition, step, q, instance.id)) };
      }
      return { valid: false };
    }

    function complementaryQubits(projectQubits) {
      const selected = new Set(projectQubits);
      return Array.from({ length: appState.qubits }, (_, qubit) => qubit)
        .filter(qubit => !selected.has(qubit));
    }

    function conditionalMarginalDistribution(state, selection) {
      const probabilities = new Float64Array(1 << selection.marginalQubits.length);
      let successProbability = 0;
      for (let basis = 0; basis < state.re.length; basis += 1) {
        let matches = true;
        for (let index = 0; index < selection.projectQubits.length; index += 1) {
          const bit = (basis & bitMaskForQubit(selection.projectQubits[index])) === 0 ? "0" : "1";
          if (bit !== selection.outcome[index]) {
            matches = false;
            break;
          }
        }
        if (!matches) continue;

        const probability = state.re[basis] ** 2 + state.im[basis] ** 2;
        successProbability += probability;
        let marginalIndex = 0;
        for (const qubit of selection.marginalQubits) {
          marginalIndex = (marginalIndex << 1)
            | ((basis & bitMaskForQubit(qubit)) === 0 ? 0 : 1);
        }
        probabilities[marginalIndex] += probability;
      }
      if (successProbability > 1e-15) {
        for (let index = 0; index < probabilities.length; index += 1) {
          probabilities[index] /= successProbability;
        }
      }
      return { probabilities, successProbability };
    }

    function renderPostselection(state) {
      const automaticEvents = state.stepPostselections || [];
      const automatic = automaticEvents.length > 0;
      const automaticSelectionEvents = [...new Map(
        automaticEvents.map(event => [event.target, event])
      ).values()].sort((a, b) => a.target - b.target);
      const selectedQubits = automaticSelectionEvents.map(event => event.target);
      const selection = automatic
        ? {
            projectQubits: selectedQubits,
            outcome: automaticSelectionEvents.map(event => String(event.value)).join(""),
            marginalQubits: complementaryQubits(selectedQubits)
          }
        : appState.postselection;
      el.postselectionDistribution.innerHTML = "";
      el.postselectionPanel.classList.toggle("is-automatic", automatic);
      if (!selection) {
        el.postselectionPanel.hidden = true;
        el.postselectionDistribution.hidden = true;
        return;
      }

      const validQubits = [...selection.projectQubits, ...selection.marginalQubits]
        .every(qubit => qubit >= 0 && qubit < appState.qubits);
      if (!validQubits) {
        el.postselectionPanel.hidden = true;
        el.postselectionDistribution.hidden = true;
        return;
      }

      const { probabilities } = conditionalMarginalDistribution(state, selection);
      el.postselectionPanel.hidden = false;

      const fragment = document.createDocumentFragment();
      const bitCount = selection.marginalQubits.length;
      for (let index = 0; index < probabilities.length; index += 1) {
        const probability = probabilities[index];
        const bits = bitCount ? index.toString(2).padStart(bitCount, "0") : "";
        const row = document.createElement("div");
        row.className = "marginal-row";
        row.setAttribute("aria-label", `${bits || "empty register"} probability ${probability.toFixed(6)}`);

        const label = document.createElement("div");
        label.className = "marginal-label";
        label.textContent = bitCount ? `|${bits}⟩` : "|⟩";

        const track = document.createElement("div");
        track.className = "marginal-track";
        const fill = document.createElement("div");
        fill.className = "marginal-fill";
        fill.style.setProperty("--probability", probability.toFixed(8));
        fill.style.setProperty("--min-probability-bar", probability < 1e-9 ? "0px" : "2px");
        track.appendChild(fill);

        const value = document.createElement("div");
        value.className = "marginal-value";
        value.textContent = probability.toFixed(6);
        row.append(label, track, value);
        fragment.appendChild(row);
      }
      el.postselectionDistribution.appendChild(fragment);
      el.postselectionDistribution.hidden = false;
    }

    function renderVector() {
      const states = computeStates();
      const step = Math.min(Math.max(appState.hoverStep, 0), states.length - 1);
      const state = states[step];
      appState.hoverStep = step;

      el.stepLabel.textContent = step === 0 ? "Step 0" : `Step ${step}`;
      el.stepDetail.textContent = `${step === 0 ? "初期状態" : `${step} 列目まで適用`} · ${state.re.length} amplitudes`;
      const previousScrollTop = el.stateVector.scrollTop;
      el.stateVector.innerHTML = "";
      el.stateVector.classList.toggle("dense", appState.qubits >= 7);
      el.stateVector.setAttribute("aria-label", `${appState.qubits}量子ビット、${state.re.length}成分の状態ベクトル`);
      const fragment = document.createDocumentFragment();

      for (let index = 0; index < state.re.length; index += 1) {
        const real = state.re[index];
        const imaginary = state.im[index];
        const mag = Math.hypot(real, imaginary);

        const row = document.createElement("div");
        row.className = "basis-row";
        row.style.setProperty("--mag", mag.toFixed(5));
        row.style.setProperty("--min-bar", mag < 0.0005 ? "0px" : "3px");
        row.style.setProperty("--phase-color", phaseColor(real, imaginary));
        row.setAttribute("aria-label", `|${basisLabel(index)}> amplitude ${mag.toFixed(3)}, coefficient ${formatComplex(real, imaginary)}`);

        const label = document.createElement("div");
        label.className = "basis-label";
        label.textContent = `|${basisLabel(index)}⟩`;

        const track = document.createElement("div");
        track.className = "amplitude-track";
        const fill = document.createElement("div");
        fill.className = "amplitude-fill";
        track.appendChild(fill);

        const coeff = document.createElement("div");
        coeff.className = "coefficient";
        coeff.textContent = formatComplex(real, imaginary);

        row.append(label, track, coeff);
        fragment.appendChild(row);
      }
      el.stateVector.appendChild(fragment);
      el.stateVector.scrollTop = previousScrollTop;
      renderPostselection(state);
    }

    function renderInspector() {
      el.inspector.innerHTML = "";
      const gateContext = selectedGateContext();
      if (gateContext) {
        renderGateInspector(gateContext);
        return;
      }
      if (appState.selectedDefinitionBlock) {
        const definition = definitionById(appState.selectedDefinitionBlock.definitionId);
        const block = nestedBlockById(definition, appState.selectedDefinitionBlock.blockId);
        if (definition && block) {
          renderNestedBlockInspector(definition, block);
          return;
        }
      }
      const instance = instanceById(appState.selectedBlockId);
      if (instance) {
        renderBlockInspector(instance);
        return;
      }
      const empty = document.createElement("div");
      empty.className = "field";
      empty.innerHTML = "<label>selection</label><span>ゲートまたはブロックを選択</span>";
      el.inspector.appendChild(empty);
    }

    function selectedGateContext() {
      if (appState.selectedId) {
        const gate = appState.ops.find(item => item.id === appState.selectedId);
        return gate ? { gate, scope: "root", qubitCount: appState.qubits, qubitOffset: 0 } : null;
      }
      if (appState.selectedDefinitionGate) {
        const definition = definitionById(appState.selectedDefinitionGate.definitionId);
        const gate = definition?.gates.find(item => item.id === appState.selectedDefinitionGate.gateId);
        return gate && definition ? {
          gate,
          scope: "definition",
          definition,
          qubitCount: definition.height,
          qubitOffset: 0
        } : null;
      }
      return null;
    }

    function renderGateInspector(context) {
      const { gate, qubitCount, qubitOffset } = context;
      el.inspector.appendChild(selectField(
        "gate",
        gate.type,
        gateTypes.map(type => ({ value: type, label: gateMenuLabel(type) })),
        value => updateGateType(context, value)
      ));
      el.inspector.appendChild(selectField(
        "target",
        gate.target,
        qubitOptions(qubitCount, qubitOffset),
        value => updateTarget(context, Number(value))
      ));

      if (isControlledGate(gate.type)) {
        const controlsText = gate.controls.map(control => `q${control + qubitOffset}`).join(" ");
        el.inspector.appendChild(textField(
          "controls",
          controlsText,
          value => updateControls(context, value)
        ));
      }

      if (gate.type === "POSTSELECT") {
        el.inspector.appendChild(selectField(
          "value",
          gate.value === 1 ? 1 : 0,
          [
            { value: 0, label: "0 · |0><0|" },
            { value: 1, label: "1 · |1><1|" }
          ],
          value => {
            gate.value = Number(value) === 1 ? 1 : 0;
            appState.hoverStep = absoluteGateStep(context) + 1;
            render();
          }
        ));
      }

      const angleFields = gateGroups[gate.type] === "rotation"
        ? [["theta", "angle"]]
        : isControlledPhaseGate(gate.type)
          ? [["theta", "angle"]]
        : gateGroups[gate.type] === "unitary"
          ? [["theta", "theta"], ["phi", "phi"], ["lambda", "lambda"]]
          : [];
      for (const [property, fieldLabel] of angleFields) {
        const field = document.createElement("div");
        field.className = "field";
        const label = document.createElement("label");
        const inputId = `${property}-${gate.id}`;
        label.setAttribute("for", inputId);
        label.innerHTML = `${fieldLabel} <span class="angle-readout">${formatAngle(gate[property] ?? 0)}</span>`;
        const input = document.createElement("input");
        input.id = inputId;
        input.type = "range";
        input.min = String(-Math.PI * 2);
        input.max = String(Math.PI * 2);
        input.step = String(Math.PI / 32);
        input.value = String(gate[property] ?? (property === "theta" ? Math.PI / 2 : 0));
        input.addEventListener("input", () => {
          gate[property] = Number(input.value);
          appState.hoverStep = absoluteGateStep(context) + 1;
          render();
        });
        field.append(label, input);
        el.inspector.appendChild(field);
      }

      if (context.scope === "definition") {
        el.inspector.appendChild(readonlyField("linked block", context.definition.name));
      }
      el.inspector.appendChild(actionField([
        { label: "Delete gate", danger: true, onClick: deleteSelected }
      ]));
    }

    function renderBlockInspector(instance) {
      const definition = definitionById(instance.definitionId);
      if (!definition) {
        const empty = document.createElement("div");
        empty.className = "field";
        empty.innerHTML = "<label>block</label><span>定義が見つかりません</span>";
        el.inspector.appendChild(empty);
        return;
      }

      el.inspector.appendChild(readonlyField("block", definition.name));
      el.inspector.appendChild(readonlyField("circuit width", "1 step"));
      el.inspector.appendChild(readonlyField("definition", `${definition.width} steps × ${definition.height} qubits`));
      el.inspector.appendChild(checkField("adjoint", instance.adjoint, checked => {
        instance.adjoint = checked;
        render();
      }));

      const actions = [
        {
          label: "Copy & place",
          onClick: () => beginBlockPlacement(definition.id, false)
        },
        {
          label: "Copy as U†",
          onClick: () => beginBlockPlacement(definition.id, true)
        },
        {
          label: "Delete block",
          danger: true,
          onClick: deleteSelected
        }
      ];
      el.inspector.appendChild(actionField(actions));
    }

    function renderNestedBlockInspector(ownerDefinition, block) {
      const definition = definitionById(block.definitionId);
      if (!definition) return;
      el.inspector.appendChild(readonlyField("nested block", definition.name));
      el.inspector.appendChild(readonlyField("inside", ownerDefinition.name));
      el.inspector.appendChild(readonlyField("size", `1 step × ${definition.height} qubits`));
      el.inspector.appendChild(checkField("adjoint", block.adjoint, checked => {
        block.adjoint = checked;
        render();
      }));
      el.inspector.appendChild(actionField([
        {
          label: "Open definition",
          onClick: () => {
            selectDefinition(definition.id);
            render();
          }
        },
        {
          label: "Delete block",
          danger: true,
          onClick: deleteSelected
        }
      ]));
    }

    function beginBlockPlacement(definitionId, adjoint) {
      const definition = definitionById(definitionId);
      if (!definition) return;
      appState.placementMode = { definitionId, adjoint };
      appState.activeDefinitionId = definition.id;
      setStatus(`${definition.name}${adjoint ? "†" : ""} の配置先セルをクリックしてください。`);
      renderCircuit();
    }

    function readonlyField(name, value) {
      const field = document.createElement("div");
      field.className = "field";
      const label = document.createElement("label");
      label.textContent = name;
      const span = document.createElement("span");
      span.textContent = value;
      field.append(label, span);
      return field;
    }

    function selectField(name, current, options, onChange) {
      const field = document.createElement("div");
      field.className = "field";
      const id = `${name.replace(/\s+/g, "-")}-${Math.random().toString(16).slice(2)}`;
      const label = document.createElement("label");
      label.setAttribute("for", id);
      label.textContent = name;
      const select = document.createElement("select");
      select.id = id;
      for (const option of options) {
        const node = document.createElement("option");
        node.value = String(option.value);
        node.textContent = option.label;
        node.selected = option.value === current;
        select.appendChild(node);
      }
      select.addEventListener("change", () => onChange(select.value));
      field.append(label, select);
      return field;
    }

    function textField(name, current, onChange) {
      const field = document.createElement("div");
      field.className = "field";
      const id = `${name.replace(/\s+/g, "-")}-${Math.random().toString(16).slice(2)}`;
      const label = document.createElement("label");
      label.setAttribute("for", id);
      label.textContent = name;
      const input = document.createElement("input");
      input.type = "text";
      input.id = id;
      input.value = current;
      input.addEventListener("change", () => onChange(input.value));
      input.addEventListener("keydown", event => {
        if (event.key !== "Enter") return;
        event.preventDefault();
        onChange(input.value);
      });
      field.append(label, input);
      return field;
    }

    function checkField(name, current, onChange) {
      const field = document.createElement("div");
      field.className = "field check-field";
      const id = `${name}-${Math.random().toString(16).slice(2)}`;
      const label = document.createElement("label");
      label.textContent = "option";
      const row = document.createElement("div");
      row.className = "check-row";
