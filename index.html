      const input = document.createElement("input");
      input.type = "checkbox";
      input.id = id;
      input.checked = current;
      input.addEventListener("change", () => onChange(input.checked));
      const text = document.createElement("label");
      text.setAttribute("for", id);
      text.textContent = name;
      row.append(input, text);
      field.append(label, row);
      return field;
    }

    function actionField(actions) {
      const field = document.createElement("div");
      field.className = "field";
      const label = document.createElement("label");
      label.textContent = "action";
      const row = document.createElement("div");
      row.className = "field-actions";
      for (const action of actions) {
        const button = document.createElement("button");
        button.className = `small-button${action.danger ? " danger" : ""}`;
        button.type = "button";
        button.textContent = action.label;
        button.addEventListener("click", action.onClick);
        row.appendChild(button);
      }
      field.append(label, row);
      return field;
    }

    function qubitOptions(count = appState.qubits, offset = 0) {
      return Array.from({ length: count }, (_, q) => ({ value: q, label: `q${q + offset}` }));
    }

    function formatAngle(theta) {
      const ratio = theta / Math.PI;
      if (Math.abs(ratio) < 0.001) return "0π";
      return `${ratio.toFixed(2).replace(/\.00$/, "")}π`;
    }

    function absoluteGateStep(context) {
      if (context.scope === "root") return context.gate.step;
      const instance = appState.blockInstances.find(item => item.definitionId === context.definition.id);
      return instance?.step || 0;
    }

    function validateGateContextCandidate(context, candidate) {
      return context.scope === "root"
        ? canPlace(candidate, context.gate.id)
        : canPlaceDefinitionGate(context.definition, candidate, context.gate.id);
    }

    function updateGateType(context, type) {
      const { gate, qubitCount } = context;
      const controls = defaultControls(type, gate.target, qubitCount);
      if (controls === null) {
        setStatus("この範囲では control 数が足りません。", true);
        renderInspector();
        return;
      }
      const candidate = {
        ...gate,
        type,
        controls: isControlledGate(type) ? controls : [],
        theta: gate.theta ?? Math.PI / 2,
        phi: gate.phi ?? 0,
        lambda: gate.lambda ?? 0,
        value: type === "POSTSELECT" ? (gate.value === 1 ? 1 : 0) : gate.value ?? 0
      };
      if (!validateGateContextCandidate(context, candidate)) {
        setStatus("ゲート種類を変更すると、ほかのゲートと重なります。", true);
        renderInspector();
        return;
      }
      Object.assign(gate, candidate);
      appState.hoverStep = absoluteGateStep(context) + 1;
      render();
    }

    function updateTarget(context, target) {
      const { gate } = context;
      const candidate = { ...gate, target };
      if (isControlledGate(gate.type)) {
        if (candidate.controls.includes(target)) {
          candidate.controls = candidate.controls.map(control => control === target ? gate.target : control);
        }
      }
      if (!validateGateContextCandidate(context, candidate)) {
        setStatus("target の変更先が重なります。", true);
        renderInspector();
        return;
      }
      Object.assign(gate, candidate);
      appState.hoverStep = absoluteGateStep(context) + 1;
      render();
    }

    function parseControls(context, value) {
      const tokens = value.trim().split(/[\s,，]+/).filter(Boolean);
      if (!tokens.length) return { error: "control を1個以上指定してください。" };
      const controls = [];
      for (const token of tokens) {
        const match = token.match(/^q?(\d+)$/i);
        if (!match) return { error: "controls は q0 q1 の形式で指定してください。" };
        const globalQubit = Number(match[1]);
        const localQubit = globalQubit - context.qubitOffset;
        if (localQubit < 0 || localQubit >= context.qubitCount) {
          return { error: `q${globalQubit} はこのゲートの範囲外です。` };
        }
        if (controls.includes(localQubit)) {
          return { error: `q${globalQubit} が重複しています。` };
        }
        if (localQubit === context.gate.target) {
          return { error: `target q${globalQubit} は control に指定できません。` };
        }
        controls.push(localQubit);
      }
      const requiredControls = minimumControlCount(context.gate.type);
      if (isControlledGate(context.gate.type) && controls.length < requiredControls) {
        return { error: `${context.gate.type} には control が${requiredControls}個以上必要です。` };
      }
      return { controls: controls.sort((a, b) => a - b) };
    }

    function updateControls(context, value) {
      const { gate } = context;
      const parsed = parseControls(context, value);
      if (parsed.error) {
        setStatus(parsed.error, true);
        renderInspector();
        return;
      }
      const candidate = { ...gate, controls: parsed.controls };
      if (!validateGateContextCandidate(context, candidate)) {
        setStatus("control の指定先がほかのゲートと重なります。", true);
        renderInspector();
        return;
      }
      Object.assign(gate, candidate);
      appState.hoverStep = absoluteGateStep(context) + 1;
      render();
    }

    document.querySelectorAll(".gate-token").forEach(button => {
      button.addEventListener("pointerdown", event => {
        if (button.dataset.tool === "BLOCK") return;
        startPointerDrag({ source: "palette", type: button.dataset.gate }, event);
      });
      button.addEventListener("click", () => {
        if (appState.suppressClick) {
          appState.suppressClick = false;
          return;
        }
        if (button.dataset.tool === "BLOCK") {
          createBlockDefinition();
        } else {
          setStatus(`${gateLabel(button.dataset.gate)} を回路またはブロック定義へドラッグしてください。`);
        }
      });
    });

    function startPointerDrag(payload, event) {
      if (event.button !== 0) return;
      if (appState.pointerDrag) cleanupPointerDrag(appState.pointerDrag);
      const sourceElement = event.currentTarget;
      sourceElement?.setPointerCapture?.(event.pointerId);
      appState.pointerDrag = {
        ...payload,
        pointerId: event.pointerId,
        sourceElement,
        startX: event.clientX,
        startY: event.clientY,
        x: event.clientX,
        y: event.clientY,
        active: false,
        ghost: null,
        overCell: null,
        overTrash: null
      };
    }

    function suppressClickBriefly(active = true) {
      if (!active) return;
      appState.suppressClick = true;
      window.clearTimeout(suppressClickBriefly.timeout);
      suppressClickBriefly.timeout = window.setTimeout(() => {
        appState.suppressClick = false;
      }, 40);
    }

    function pointerDragLabel(payload) {
      if (payload.type) return payload.type;
      if (payload.source === "block-library") return definitionById(payload.definitionId)?.name || "Block";
      if (payload.source === "block") {
        const instance = instanceById(payload.blockId);
        return definitionById(instance?.definitionId)?.name || "Block";
      }
      if (payload.source === "definition-block") {
        const definition = definitionById(payload.definitionId);
        const block = nestedBlockById(definition, payload.blockId);
        return definitionById(block?.definitionId)?.name || "Block";
      }
      const op = appState.ops.find(item => item.id === payload.opId);
      return op?.type || "";
    }

    function blockDefinitionForDrag(payload) {
      if (payload.source === "block-library") return definitionById(payload.definitionId);
      if (payload.source === "block") {
        const instance = instanceById(payload.blockId);
        return definitionById(instance?.definitionId);
      }
      if (payload.source === "definition-block") {
        const owner = definitionById(payload.definitionId);
        const block = nestedBlockById(owner, payload.blockId);
        return definitionById(block?.definitionId);
      }
      return null;
    }

    function ensureGhost(drag) {
      if (drag.ghost || drag.source === "definition-resize") return;
      const ghost = document.createElement("div");
      const type = pointerDragLabel(drag);
      if (
        drag.source === "block-library"
        || drag.source === "block"
        || drag.source === "definition-block"
      ) {
        ghost.className = "block-drag-ghost";
        applyBlockColor(ghost, blockDefinitionForDrag(drag));
        ghost.textContent = type;
      } else {
        ghost.className = "gate-token drag-ghost";
        applyGateColor(ghost, type);
        ghost.textContent = gateLabel(type, drag.value);
      }
      document.body.appendChild(ghost);
      drag.ghost = ghost;
    }

    function updateGhost(drag, x, y) {
      ensureGhost(drag);
      drag.ghost.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%)`;
    }

    function clearPointerOverCell(drag = appState.pointerDrag) {
      const cell = drag?.overCell;
      if (cell) cell.classList.remove("drag-over", "invalid-drop");
      if (drag) drag.overCell = null;
    }

    function clearPointerOverTrash(drag = appState.pointerDrag) {
      const trash = drag?.overTrash;
      if (trash) trash.classList.remove("drag-over");
      if (drag) drag.overTrash = null;
    }

    function isDeletableGateDrag(drag) {
      return drag?.source === "placed"
        || drag?.source === "block-gate"
        || drag?.source === "definition-block";
    }

    function cleanupPointerDrag(drag = appState.pointerDrag) {
      if (!drag) return;
      if (drag.autoScrollFrame) {
        window.cancelAnimationFrame(drag.autoScrollFrame);
        drag.autoScrollFrame = null;
      }
      clearPointerOverCell(drag);
      clearPointerOverTrash(drag);
      if (drag.ghost) drag.ghost.remove();
      try {
        if (drag.sourceElement?.hasPointerCapture?.(drag.pointerId)) {
          drag.sourceElement.releasePointerCapture(drag.pointerId);
        }
      } catch {
        // Pointer capture may already be released by the browser.
      }
    }

    function updatePointerOverCell(drag, x, y) {
      const node = document.elementFromPoint(x, y);
      const trash = node?.closest?.(".trash-zone") || null;
      if (trash && isDeletableGateDrag(drag)) {
        clearPointerOverCell(drag);
        if (trash !== drag.overTrash) clearPointerOverTrash(drag);
        trash.classList.add("drag-over");
        drag.overTrash = trash;
        return;
      }
      clearPointerOverTrash(drag);
      const cell = node?.closest?.(".drop-cell") || null;
      if (cell !== drag.overCell) clearPointerOverCell(drag);
      if (!cell) return;
      const step = Number(cell.dataset.step);
      const qubit = Number(cell.dataset.qubit);
      const candidate = candidateForDrop(
        drag,
        step,
        qubit,
        cell.dataset.scope || "circuit",
        cell.dataset.definitionId || null
      );
      cell.classList.add("drag-over");
      cell.classList.toggle("invalid-drop", !candidate.valid);
      drag.overCell = cell;
    }

    function edgeScrollDelta(position, start, end, threshold = 72) {
      if (position < start + threshold) {
        return -Math.ceil(((start + threshold - position) / threshold) * 18);
      }
      if (position > end - threshold) {
        return Math.ceil(((position - (end - threshold)) / threshold) * 18);
      }
      return 0;
    }

    function scrollContainerAtPoint(x, y) {
      const containers = [
        ...document.querySelectorAll(".circuit-scroller, .block-editor-scroller")
      ];
      return containers.reverse().find(container => {
        const rect = container.getBoundingClientRect();
        return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
      }) || null;
    }

    function performDragAutoScroll(drag) {
      const x = drag.x;
      const y = drag.y;
      let scrolled = false;

      const container = scrollContainerAtPoint(x, y);
      if (container) {
        const rect = container.getBoundingClientRect();
        const dx = edgeScrollDelta(x, rect.left, rect.right, 58);
        const dy = edgeScrollDelta(y, rect.top, rect.bottom, 58);
        const oldLeft = container.scrollLeft;
        const oldTop = container.scrollTop;
        if (container.scrollWidth > container.clientWidth) container.scrollLeft += dx;
        if (container.scrollHeight > container.clientHeight) container.scrollTop += dy;
        scrolled = container.scrollLeft !== oldLeft || container.scrollTop !== oldTop;
      }

      const pageDy = edgeScrollDelta(y, 0, window.innerHeight, 84);
      if (pageDy) {
        const oldY = window.scrollY;
        window.scrollBy(0, pageDy);
        scrolled = scrolled || window.scrollY !== oldY;
      }

      return scrolled;
    }

    function runDragAutoScroll(drag) {
      drag.autoScrollFrame = null;
      if (!drag.active || appState.pointerDrag !== drag) return;
      if (!performDragAutoScroll(drag)) return;
      updatePointerOverCell(drag, drag.x, drag.y);
      drag.autoScrollFrame = window.requestAnimationFrame(() => runDragAutoScroll(drag));
    }

    function requestDragAutoScroll(drag, x, y) {
      drag.x = x;
      drag.y = y;
      if (performDragAutoScroll(drag)) updatePointerOverCell(drag, x, y);
      if (drag.autoScrollFrame) return;
      drag.autoScrollFrame = window.requestAnimationFrame(() => runDragAutoScroll(drag));
    }

    function deleteDraggedGate(payload) {
      if (payload.source === "placed") {
        appState.ops = appState.ops.filter(op => op.id !== payload.opId);
      } else if (payload.source === "block-gate") {
        const definition = definitionById(payload.definitionId);
        if (!definition) return false;
        definition.gates = definition.gates.filter(gate => gate.id !== payload.gateId);
      } else if (payload.source === "definition-block") {
        const definition = definitionById(payload.definitionId);
        if (!definition) return false;
        definition.blocks = (definition.blocks || []).filter(block => block.id !== payload.blockId);
      } else {
        return false;
      }
      clearSelection();
      setStatus("回路要素を削除しました。");
      render();
      return true;
    }

    function resizedDefinitionPlacementValid(definition, nextHeight) {
      const related = appState.blockInstances.filter(instance => instance.definitionId === definition.id);
      const futureRects = related.map(instance => {
        return { instance, rect: {
          left: instance.step,
          right: instance.step,
          top: instance.qubit,
          bottom: instance.qubit + nextHeight - 1
        }};
      });

      for (const item of futureRects) {
        if (item.rect.left < 0 || item.rect.top < 0 || item.rect.right >= appState.steps || item.rect.bottom >= appState.qubits) {
          return false;
        }
        for (const other of appState.blockInstances) {
          if (other.id === item.instance.id || other.definitionId === definition.id) continue;
          if (rectsOverlap(item.rect, blockRect(other))) return false;
        }
        for (const op of appState.ops) {
          if (gateSpanTouchesRect(op, item.rect)) return false;
        }
      }

      for (let i = 0; i < futureRects.length; i += 1) {
        for (let j = i + 1; j < futureRects.length; j += 1) {
          if (rectsOverlap(futureRects[i].rect, futureRects[j].rect)) return false;
        }
      }

      for (const owner of appState.blockDefinitions) {
        for (const block of owner.blocks || []) {
          if (block.definitionId !== definition.id) continue;
          if (
            !canPlaceDefinitionBlock(
              owner,
              definition.id,
              block.step,
              block.qubit,
              block.id,
              nextHeight
            )
          ) {
            return false;
          }
        }
      }
      return true;
    }

    function definitionResizeCandidate(drag, x, y) {
      const definition = definitionById(drag.definitionId);
      if (!definition) return { valid: false };
      const dx = Math.round((x - drag.startX) / gridMetrics.cellWidth);
      const dy = Math.round((y - drag.startY) / gridMetrics.cellHeight);
      const deltaStep = drag.corner.includes("w") ? -dx : 0;
      const deltaQubit = drag.corner.includes("n") ? -dy : 0;
      const width = drag.startWidth + (drag.corner.includes("e") ? dx : -dx);
      const height = drag.startHeight + (drag.corner.includes("s") ? dy : -dy);
      if (
        width < 1
        || width > MAX_BLOCK_STEPS
        || height < 1
        || height > appState.qubits
      ) {
        return { valid: false, width, height, deltaStep, deltaQubit };
      }
      const gatesFit = definition.gates.every(gate => {
        const shifted = {
          ...gate,
          step: gate.step + deltaStep,
          target: gate.target + deltaQubit,
          controls: gate.controls.map(q => q + deltaQubit)
        };
        return basicGateBoundsValid(shifted, width, height);
      });
      const blocksFit = (definition.blocks || []).every(block => {
        const nestedDefinition = definitionById(block.definitionId);
        if (!nestedDefinition) return false;
        const shiftedStep = block.step + deltaStep;
        const shiftedQubit = block.qubit + deltaQubit;
        return shiftedStep >= 0
          && shiftedStep < width
          && shiftedQubit >= 0
          && shiftedQubit + nestedDefinition.height <= height;
      });
      return {
        width,
        height,
        deltaStep,
        deltaQubit,
        valid: gatesFit && blocksFit && resizedDefinitionPlacementValid(definition, height)
      };
    }

    function commitDefinitionResize(definitionId, candidate) {
      if (!candidate?.valid) {
        setStatus("定義内のゲートまたは配置済みブロックと重なるため、その大きさにはできません。", true);
        render();
        return false;
      }
      const definition = definitionById(definitionId);
      if (!definition) return false;
      for (const gate of definition.gates) {
        gate.step += candidate.deltaStep;
        gate.target += candidate.deltaQubit;
        gate.controls = gate.controls.map(q => q + candidate.deltaQubit);
      }
      for (const block of definition.blocks || []) {
        block.step += candidate.deltaStep;
        block.qubit += candidate.deltaQubit;
      }
      definition.width = candidate.width;
      definition.height = candidate.height;
      appState.activeDefinitionId = definition.id;
      render();
      return true;
    }

    function resizeActiveDefinition(width, height) {
      const definition = definitionById(appState.activeDefinitionId);
      if (!definition) return false;
      const candidate = {
        width,
        height,
        deltaStep: 0,
        deltaQubit: 0,
        valid: width >= 1
          && width <= MAX_BLOCK_STEPS
          && height >= 1
          && height <= appState.qubits
          && definition.gates.every(gate => basicGateBoundsValid(gate, width, height))
          && (definition.blocks || []).every(block => {
            const nestedDefinition = definitionById(block.definitionId);
            return Boolean(
              nestedDefinition
              && block.step >= 0
              && block.step < width
              && block.qubit >= 0
              && block.qubit + nestedDefinition.height <= height
            );
          })
          && resizedDefinitionPlacementValid(definition, height)
      };
      return commitDefinitionResize(definition.id, candidate);
    }

    document.addEventListener("pointermove", event => {
      const drag = appState.pointerDrag;
      if (!drag) return;
      const distance = Math.hypot(event.clientX - drag.startX, event.clientY - drag.startY);
      if (!drag.active && distance < 5) return;
      drag.active = true;
      drag.x = event.clientX;
      drag.y = event.clientY;
      if (drag.source === "definition-resize") {
        drag.resizeCandidate = definitionResizeCandidate(drag, event.clientX, event.clientY);
        const definition = definitionById(drag.definitionId);
        const candidate = drag.resizeCandidate;
        if (definition && candidate.width > 0 && candidate.height > 0) {
          el.blockDefinitionTitle.textContent = `${definition.name} · ${candidate.width} steps × ${candidate.height} qubits`;
        }
        event.preventDefault();
        return;
      }
      updateGhost(drag, event.clientX, event.clientY);
      updatePointerOverCell(drag, event.clientX, event.clientY);
      requestDragAutoScroll(drag, event.clientX, event.clientY);
      event.preventDefault();
    });

    document.addEventListener("pointerup", event => {
      const drag = appState.pointerDrag;
      if (!drag) return;
      if (drag.source === "definition-resize") {
        const wasActive = drag.active;
        const candidate = drag.resizeCandidate;
        cleanupPointerDrag(drag);
        appState.pointerDrag = null;
        if (wasActive) commitDefinitionResize(drag.definitionId, candidate);
        else renderBlockDefinitionEditor();
        suppressClickBriefly(wasActive);
        if (wasActive) event.preventDefault();
        return;
      }
      const drop = drag.active && drag.overCell
        ? {
          step: Number(drag.overCell.dataset.step),
          qubit: Number(drag.overCell.dataset.qubit),
          scope: drag.overCell.dataset.scope || "circuit",
          definitionId: drag.overCell.dataset.definitionId || null
        }
        : null;
      const droppedOnTrash = Boolean(drag.active && drag.overTrash && isDeletableGateDrag(drag));
      const payload = {
        source: drag.source,
        type: drag.type,
        opId: drag.opId,
        definitionId: drag.definitionId,
        gateId: drag.gateId,
        blockId: drag.blockId
      };
      const wasActive = drag.active;

      cleanupPointerDrag(drag);
      appState.pointerDrag = null;

      if (droppedOnTrash) {
        deleteDraggedGate(payload);
      } else if (drop && payload.source === "palette") {
        if (drop.scope === "definition") {
          placeDefinitionGate(drop.definitionId, payload.type, drop.step, drop.qubit);
        } else {
          placeGate(payload.type, drop.step, drop.qubit);
        }
      } else if (drop && drop.scope === "circuit" && payload.source === "placed") {
        moveGate(payload.opId, drop.step, drop.qubit);
      } else if (drop && drop.scope === "definition" && payload.source === "block-gate") {
        moveDefinitionGate(payload.definitionId, payload.gateId, drop.step, drop.qubit);
      } else if (drop && drop.scope === "definition" && payload.source === "block-library") {
        placeDefinitionBlock(drop.definitionId, payload.definitionId, drop.step, drop.qubit, false);
      } else if (drop && drop.scope === "definition" && payload.source === "definition-block") {
        moveDefinitionBlock(payload.definitionId, payload.blockId, drop.step, drop.qubit);
      } else if (drop && drop.scope === "circuit" && payload.source === "block-library") {
        placeBlockCopy(payload.definitionId, drop.step, drop.qubit, false);
      } else if (drop && drop.scope === "circuit" && payload.source === "block") {
        moveBlock(payload.blockId, drop.step, drop.qubit);
      }

      if (wasActive) {
        suppressClickBriefly();
        event.preventDefault();
      }
    });

    function cancelPointerDrag() {
      const drag = appState.pointerDrag;
      if (!drag) return;
      const wasActive = drag.active;
      const wasResize = drag.source === "definition-resize";
      cleanupPointerDrag(drag);
      appState.pointerDrag = null;
      suppressClickBriefly(wasActive);
      if (wasResize) renderBlockDefinitionEditor();
    }

    document.addEventListener("pointercancel", cancelPointerDrag);
    window.addEventListener("blur", cancelPointerDrag);
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) cancelPointerDrag();
    });

    el.trashZone.addEventListener("click", () => {
      if (
        appState.selectedId
        || appState.selectedDefinitionGate
        || appState.selectedDefinitionBlock
      ) {
        deleteSelected();
      } else {
        setStatus("削除する回路要素を選択するか、ここへドラッグしてください。");
      }
    });

    function setStepCount(nextStepCount) {
      const next = Math.max(1, Math.min(MAX_STEPS, Math.floor(nextStepCount)));
      if (!Number.isFinite(nextStepCount) || next === appState.steps) {
        el.stepCountInput.value = String(appState.steps);
        return false;
      }
      if (next < appState.steps) {
        if (appState.blockInstances.some(instance => instance.step >= next)) {
          setStatus("指定範囲より後ろにブロックがあります。", true);
          el.stepCountInput.value = String(appState.steps);
          return false;
        }
        if (appState.ops.some(op => op.step >= next)) {
          setStatus("指定範囲より後ろにゲートがあります。", true);
          el.stepCountInput.value = String(appState.steps);
          return false;
        }
      }
      appState.steps = next;
      appState.hoverStep = Math.min(appState.hoverStep, appState.steps);
      render();
      return true;
    }

    document.getElementById("addQubitButton").addEventListener("click", () => {
      if (appState.qubits >= 10) {
        setStatus("状態ベクトル表示は 10 qubits までです。", true);
        return;
      }
      appState.qubits += 1;
      render();
    });

    document.getElementById("removeQubitButton").addEventListener("click", () => {
      if (appState.qubits <= 1) return;
      const nextQubitCount = appState.qubits - 1;
      if (appState.blockDefinitions.some(definition => definition.height > nextQubitCount)) {
        setStatus("ブロック定義の高さを先に小さくしてください。", true);
        return;
      }
      if (appState.blockInstances.some(instance => blockRect(instance).bottom >= nextQubitCount)) {
        setStatus("最下段にブロックがあるため、先に移動または解除してください。", true);
        return;
      }
      appState.qubits -= 1;
      appState.ops = appState.ops.filter(op => usedRows(op).every(row => row < appState.qubits));
      if (!appState.ops.some(op => op.id === appState.selectedId)) appState.selectedId = null;
      render();
    });

    document.getElementById("addStepButton").addEventListener("click", () => {
      if (appState.steps >= MAX_STEPS) {
        setStatus(`${MAX_STEPS} steps まで追加できます。`, true);
        return;
      }
      setStepCount(appState.steps + 1);
    });

    document.getElementById("removeStepButton").addEventListener("click", () => {
      if (appState.steps <= 1) return;
      const nextStepCount = appState.steps - 1;
      if (appState.blockInstances.some(instance => blockRect(instance).right >= nextStepCount)) {
        setStatus("最後の列にブロックがあるため、先に移動または解除してください。", true);
        return;
      }
      appState.steps -= 1;
      appState.ops = appState.ops.filter(op => op.step < appState.steps);
      appState.hoverStep = Math.min(appState.hoverStep, appState.steps);
      if (!appState.ops.some(op => op.id === appState.selectedId)) appState.selectedId = null;
      render();
    });

    el.stepCountInput.addEventListener("change", () => {
      setStepCount(Number(el.stepCountInput.value));
    });
    el.stepCountInput.addEventListener("keydown", event => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      setStepCount(Number(el.stepCountInput.value));
      el.stepCountInput.blur();
    });

    document.getElementById("newBlockButton").addEventListener("click", createBlockDefinition);
    function commitActiveBlockName() {
      const definition = definitionById(appState.activeDefinitionId);
      const name = el.blockNameInput.value.trim();
      if (!definition || !name) {
        renderBlockDefinitionEditor();
        return false;
      }
      definition.name = name;
      render();
      return true;
    }
    el.blockNameInput.addEventListener("change", commitActiveBlockName);
    el.blockNameInput.addEventListener("keydown", event => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      commitActiveBlockName();
      el.blockNameInput.blur();
    });
    el.addBlockStepButton.addEventListener("click", () => {
      const definition = definitionById(appState.activeDefinitionId);
      if (definition) resizeActiveDefinition(definition.width + 1, definition.height);
    });
    el.removeBlockStepButton.addEventListener("click", () => {
      const definition = definitionById(appState.activeDefinitionId);
      if (definition) resizeActiveDefinition(definition.width - 1, definition.height);
    });
    el.addBlockQubitButton.addEventListener("click", () => {
      const definition = definitionById(appState.activeDefinitionId);
      if (definition) resizeActiveDefinition(definition.width, definition.height + 1);
    });
    el.removeBlockQubitButton.addEventListener("click", () => {
      const definition = definitionById(appState.activeDefinitionId);
      if (definition) resizeActiveDefinition(definition.width, definition.height - 1);
    });
    el.placeBlockButton.addEventListener("click", () => {
      if (appState.activeDefinitionId) beginBlockPlacement(appState.activeDefinitionId, false);
    });
    el.placeAdjointBlockButton.addEventListener("click", () => {
      if (appState.activeDefinitionId) beginBlockPlacement(appState.activeDefinitionId, true);
    });
    el.deleteBlockDefinitionButton.addEventListener("click", deleteActiveDefinition);

    document.getElementById("deleteButton").addEventListener("click", deleteSelected);
    document.getElementById("clearButton").addEventListener("click", clearCircuit);
    document.getElementById("exampleButton").addEventListener("click", setExample);
    document.getElementById("groverExampleButton").addEventListener("click", setGroverExample);
    document.getElementById("randomExampleButton").addEventListener("click", setRandomCircuitExample);
    document.getElementById("periodExampleButton").addEventListener("click", setPeriodFindingExample);
    document.getElementById("dslButton").addEventListener("click", () => {
      el.dslText.value = exportDsl();
      setDslStatus("Current circuit exported.");
      el.dslDialog.showModal();
      el.dslText.focus();
    });
    document.getElementById("dslCloseButton").addEventListener("click", () => {
      el.dslDialog.close();
    });
    document.getElementById("dslExportButton").addEventListener("click", () => {
      el.dslText.value = exportDsl();
      setDslStatus("Current circuit exported.");
    });
    document.getElementById("dslImportButton").addEventListener("click", importDslFromEditor);
    document.getElementById("dslOpenButton").addEventListener("click", () => {
      el.dslFileInput.value = "";
      el.dslFileInput.click();
    });
    el.dslFileInput.addEventListener("change", async () => {
      const [file] = el.dslFileInput.files;
      if (!file) return;
      try {
        el.dslText.value = await file.text();
        setDslStatus(`${file.name} opened.`);
        el.dslText.focus();
      } catch (error) {
        setDslStatus(`Open failed: ${error.message}`, true);
      }
    });
    document.getElementById("dslDownloadButton").addEventListener("click", () => {
      const blob = new Blob([el.dslText.value], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = "circuit.qvis";
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 0);
      setDslStatus("circuit.qvis downloaded.");
    });
    el.dslText.addEventListener("keydown", event => {
      if (event.key !== "Enter" || (!event.metaKey && !event.ctrlKey)) return;
      event.preventDefault();
      importDslFromEditor();
    });
    document.getElementById("initialStepButton").addEventListener("click", () => {
      appState.hoverStep = 0;
      render();
    });
    document.getElementById("finalStepButton").addEventListener("click", () => {
      appState.hoverStep = appState.steps;
      render();
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && appState.placementMode) {
        appState.placementMode = null;
        setStatus("ブロック配置をキャンセルしました。");
        renderCircuit();
        return;
      }
      if (event.key === "Delete" || event.key === "Backspace") {
        const tag = document.activeElement?.tagName;
        if (tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA" || document.activeElement?.isContentEditable) {
          return;
        }
        deleteSelected();
      }
    });

    setExample();
  </script>
</body>
</html>
